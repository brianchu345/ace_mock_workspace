# =============================================================================
# static_tool_version.cfg — Static analysis tool versions
# =============================================================================
# Includes tool_version.cfg (RTL/FE base) then adds static-analysis-specific
# versions for VC-CDC, VC-Lint, and related methodology packages.
#
# Source layers:
#   1. pesg_fe.baseline_tools/dv_tools.cth (vc_static_home_version, etc.)
#   2. ioss3_hsio/baseline_tools/vc_cdc/tool.cth (project overrides, win)
#   3. ioss3_hsio/baseline_tools/psg_tools.cth (PSG_FE_CHECKER_UTILITIES_VERSION)
# =============================================================================

@include tool_version.cfg

# =============================================================================
# [toolversion] — static analysis version overrides
# =============================================================================
[toolversion]

# VC-CDC — ioss3 project versions (override pesg_fe.baseline_tools base)
VCCDC_VERSION                = V-2023.12-SP2-10
VCCOMMON_VERSION             = V-2023.12-SP2-7
VCCDC_METHODOLOGY_VERSION    = 0.06.08.pre01.25ww23
VCCOMMON_METHODOLOGY_VERSION = 2.04.07.25ww07
CDCQA_VERSION                = 2025.02.01

# PSG checker utilities — CDCQA/lint methodology TCLs, waiver files, audit scripts
# Must be >= 1.27.x — earlier versions lack vccdc_methodology/ and vc_cdc scripts
# Check /p/cth/cad/psg_fe_checker_utilities/ for available versions
PSG_FE_CHECKER_UTILITIES_VERSION = 1.27.2

# VC-Lint family (vc_lint, vc_effm, vc_ol, vc_sva) — ioss3 project versions
# Note: VCCOMMON_METHODOLOGY_VERSION differs by tool variant:
#   vc_cdc: 2.04.07.25ww07 (above)   vc_lint: 2.04.08.25ww11 (overridden in tool cfg)
VCLINT_VERSION             = V-2023.12-SP2-10
VCLINT_METHODOLOGY_VERSION = 2.02.22.25ww18

# VCFormal — no ioss3 project override; Cheetah-RTL base version
VC_VERSION = T-2022.06

# --- VC-LP (Low Power) ---
VCLP_VERSION             = V-2023.12-SP2-2
VCLP_METHODOLOGY_VERSION = 5.00.04.24ww44

# --- JasperGold (formal — RTL jasper and DV jasperdv share this version) ---
# FC_VERSION, FISHTAIL_VERSION, TCM_METHODOLOGY_VERSION already in tool_version.cfg
JG_VERSION = 2024.09

# --- Conformal LEC (RTL equivalence check; DV palladium uses lec_version separately) ---
LEC_VERSION = 24.10-s200

# --- Tessent MBIST / DFT (mint) ---
MINT_VERSION          = v23ww49
MINT_TESSENT_VERSION  = 2023.3
MINT_VCS_VERSION      = R-2020.12-SP2-3
MINT_VERDI_VERSION    = R-2020.12-SP2-3

# --- PowerArtist ---
POWERARTIST_VERSION = 2023R1.3

# --- PUNI (RTL IP unification / integration) ---
PUNI_VERSION       = 23.01.001
PUNI_UTILS_VERSION = 20.10.03

# --- QuestaSim RTL (activity=static; DV questasim uses lowercase questasim key) ---
# QUESTA_VERSION already in tool_version.cfg (w241129 ioss3 override)
VISUALIZER_VERSION  = w230217   # Mentor Visualizer for Questa; verify matches QUESTA_VERSION

# --- RTLA (Synopsys RTL Architect) ---
RTLA_VERSION    = U-2022.12-SP6-T-20240620
PP_RTLA_VERSION = V-2023.12-SP3    # for pprtl flow

# --- PrimePower RTL (pprtl) ---
# PP_VERSION already in tool_version.cfg (W-2024.09-SP3 ioss3 override)
LC_VERSION = U-2022.12-SP6

# --- Riviera-PRO (RTL simulation; rivierasw shares tool, differs at flow level) ---
# Defined in ioss3/riviera/tool.cth directly; capturing here for uniform access
RIVIERA_VERSION = 2025.04

# --- SpyGlass CDC (sgcdc) ---
CDC_SPYGLASS_VERSION    = T-2022.06-SP2-9-B4-28Feb24
CDC_SPYGLASS_DC_VERSION = R-2020.09-SP5-1
CDC_METHODOLOGY_VERSION = 5.00.12
CDCLINT_VERSION         = 2.00.14

# --- SpyGlass DFT (sgdft) ---
# DFT_SPYGLASS_VERSION already in tool_version.cfg (W-2024.09-SP2-2 ioss3 override)
# DFT_SPYGLASS_PATH and DFT_METHODOLOGY_PATH already set in tool_version.cfg [envs]
DFT_SPYGLASS_DC_VERSION  = R-2020.09-SP5-1
DFT_METHODOLOGY_VERSION  = 2.20.23ww33

# --- SpyGlass Lint (sglint) ---
# LINT_SPYGLASS_VERSION not found in any Cheetah config layer — set TBD
LINT_SPYGLASS_VERSION    = TBD
LINT_SPYGLASS_DC_VERSION = R-2020.09-SP5-1
LINT_METHODOLOGY_VERSION = TBD

# --- SpyGlass OL (sgol) ---
# OL_SPYGLASS_VERSION not found in any Cheetah config layer — set TBD
OL_SPYGLASS_VERSION    = TBD
OL_SPYGLASS_DC_VERSION = R-2020.09-SP5-1
OL_METHODOLOGY_VERSION = TBD

# --- SoC Builder (socbuilder) ---
SOCBUILDER_VERSION = 0.38.0

# --- UltraBuild (ub) DFT tool ---
UB_VERSION           = 24.04.001
UB_MINT_VERSION      = v24ww43
IDS_VERSION          = 0.30.1
USCG_VERSION         = 4.6.5
IJTAG_TAP_NW_VERSION = DTEG_IJTAG_TAP_NW3.0_2024WW17_FV_1P4

# --- h2b (Hard-to-Boundary LibAnalyzer flow) ---
ARC_BIN_VERSION      = 21.01.001.p001
LIB_ANALYZER_VERSION = 23.01.02

# --- IPQC (IP quality check / zircon) ---
IPQC_VERSION       = 24.04.02
IPQC_RULES_VERSION = 24.04.02

# --- PSG fepackager (RTL feature packager) ---
FEPACKAGER_VERSION = 24.02.003

# --- PSG psg_lift ---
PSG_LIFT_VERSION = 1.03

# --- repoqc ---
REPOQC_VERSION = 25.08.14

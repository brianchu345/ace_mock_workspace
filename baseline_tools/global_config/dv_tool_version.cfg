# =============================================================================
# dv_tool_version.cfg — DV simulation tool versions
# =============================================================================
# Includes tool_version.cfg (RTL/FE base) then adds DV-specific versions.
# Copied directly from the three Cheetah layers that constitute the DV stack:
#   1. pesg_fe.baseline_tools/dv_tools.cth          — team-wide DV base
#   2. /p/hdk/pu_tu/.../2024.09.eng.fe.240913/dv_tools.cth — HDK overlay
#   3. ioss3_hsio/baseline_tools/dv_tools.cth        — project overrides (wins)
#
# DV flows include this file; RTL-only flows include tool_version.cfg directly.
# =============================================================================

@include tool_version.cfg

# =============================================================================
# [toolversion] — DV tool version overrides on top of RTL base
# =============================================================================
[toolversion]

# --- vcssim (DV VCS simulation) ---
# ioss3 override — aligned with dv/frontend (higher than pesg_fe base V-2023.12-SP2-3)
vcssim_vcs   = V-2023.12-SP1-1
vcssim_verdi = V-2023.12-SP1-1

# --- DV simulators ---
questasim = w240726
xcelium   = 24.09.071
specman   = 20.09.007

# --- DVB (design-verification bus infrastructure) ---
dvb = 2024.12.fe.DVB.1.4

# --- CF utilities (TMS/coverage framework scripts) ---
cf_utils = 2024.09.fe.cf_utils.0.0.17

# --- OneSource / CRFlow (register/spec generation) ---
onesource        = 24.37.4
socbuilder_client = 0.37.1

# --- Emulation VCS/Verdi (separate from RTL VCS_VERSION) ---
emu_vcs   = S-2021.09-SP2-9
emu_verdi = S-2021.09-SP2-8-T-20230322

# --- Other DV simulation / formal ---
zoix      = V-2023.12-SP2-2
euclide   = V-2023.12-SP2-2
certitude = V-2023.12-SP2-2
emurun    = 1.14.1

# --- Emulation platform tools (veloce/vps/zebu) ---
zse             = V24.03-1_B4_240822
emu_designcompiler = R-2020.09-SP5-1
emu_gcc         = 12.2.0
emu_tb_gcc      = 12.2.0
jem             = 25.0.0
simics          = 6.0.176

# --- VPS / FPGA platform tools ---
vps             = 2023.06
quartus         = 21.2.0.72
vivado          = 2022.1-ep7
red_softmodel   = v21.2
visualizer      = 2021.4
vps_questasim   = 2021.4
fpga_gcc        = 12.2.0
fpga_tb_gcc     = 12.2.0

# --- VISA (DV waveform/assertion — slightly older DV version; RTL uses VISAROOT_VERSION=5.3.3) ---
visa_root       = 5.3
visaflow_root   = 4.7

# --- DVT (AMIQ DVT IDE) ---
dvt = 23.01.09-e422

# --- Moab (Cadence job scheduler) ---
moab = 1.01.15

# --- Stratus (Cadence HLS) ---
stratus = 22.02.001

# --- UTDB (DV test database) ---
utdb = 25.00.1

# --- FuseFlow (OneSource fuse register flow; uses onesource + socbuilder_client already defined) ---
socfusegen = d24ww24.6

# --- GTK+ (GUI toolkit for Euclide) ---
gtkp = 3.22.28

# --- Palladium DV emulation platform (Cadence) ---
# CDN_HOME_PATH = /p/hdk/rtl/cad/x86-64_linux26/cadence
wxe_version    = 24.05.205.s002
xlm_version    = 24.12.081
hdlice_version = 24.05.157.s001
ixcom_version  = 24.05.157.s001
lec_version    = 22.20-d136   # Cadence Conformal LEC DV version (vs. RTL LEC_VERSION=24.10-s200)
pal_script_version = 1.04.00
pal_dw_version     = 20231101

# --- HAPS / FPGA emulation platform (Synopsys ProtoCom + Xilinx Vivado) ---
# protocompiler already partially tracked; aligning with pesg_fe latest
protocompiler    = V-2023.12-Patch5
fpga_vcs         = U-2023.03-SP2-8
fpga_verdi       = V-2023.12-SP2
haps_dc_version  = R-2020.09-SP5-1   # Design Compiler version used inside HAPS

# =============================================================================
# [envs] — DV workspace paths (project-local; not global tool installs)
# =============================================================================
[envs]
# Xcelium DV install base (HDK path; no PSG mirror for DV xcelium)
XCM_BASE_PATH = /p/hdk/rtl/cad/x86-64_linux30/cadence/xcelium

# VIP submodule paths — defined in-workarea, not in a global install location
# ToDo: develop methodology to control these at project level, not repo level
SAOLA_HOME      = ${WORKAREA}/subip/vip/saola
UVM_HOME        = ${WORKAREA}/subip/vip/uvm
DESIGNWARE_HOME = ${WORKAREA}/subip/vip/designware

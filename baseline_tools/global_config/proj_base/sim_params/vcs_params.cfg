# =============================================================================
# vcs_params.cfg — shared VCS analyze/elab/W2E parameters
# =============================================================================
# Included by all vcs* flow configs to avoid duplicating identical settings.
# Individual flows @include this file and override what they need in their
# own [params] block — e.g. ALTR_VCS_ELAB_SETTINGS for vcssw.
#
# DW_SIM is set in global_project.cfg [envs] and resolved at wrapper time.
# UVM_PKG_TAG is set in global_project.cfg [envs].
# =============================================================================

[params]
# Base analyze flags — SV mode, timescale, DesignWare library search
# Identical across vcs, vcsdv, vcsdvpp, vcssw in Cheetah; unified here.
ALTR_VCS_ANALYZE_SETTINGS = -sverilog -timescale=1ns/1ps -y ${DW_SIM} +libext+.v +incdir+${DW_SIM}

# Base elab flags — empty by default; flows override as needed:
#   vcs_flow.cfg    overrides to: -full64
#   vcssw_flow.cfg  overrides to: -error=DTIE
ALTR_VCS_ELAB_SETTINGS =

# Warn-to-error filter filelists — consumed by VERILOG_ANALYZE_OPTS / ELAB_OPTS_SWITCH
W2E_ANALYZE = -f $WORKAREA/baseline_tools/flows/vcs/vcswarn2err/w2e_vlog_ip-soc_l5.f
W2E_ELAB    = -file $WORKAREA/baseline_tools/flows/vcs/vcswarn2err/w2e_elab_ip-soc_l5.f

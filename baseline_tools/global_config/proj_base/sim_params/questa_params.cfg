[params]
ALTR_QUESTA_ANALYZE_SETTINGS    = -sv +libext+.v+.vs+.sv+.vh -printinfilenames -source -libverbose -fsmverbose -warning 1902 -warning 19 -y ${DW_SIM} +libext+.v +incdir+${DW_SIM}
ALTR_QUESTASW_ANALYZE_SETTINGS  = -sv +libext+.v+.vs+.sv+.vh -printinfilenames -source -libverbose -fsmverbose -warning 1902 -warning 19 -y ${DW_SIM} +libext+.v +incdir+${DW_SIM}
ALTR_QUESTA_ELAB_SETTINGS       = -L work -msglimitcount 10000 -msglimit error -libverbose=prlib
ALTR_QUESTASW_ELAB_SETTINGS     = -L work -msglimitcount 10000 -msglimit error -libverbose=prlib

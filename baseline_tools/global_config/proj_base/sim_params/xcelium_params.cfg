# =============================================================================
# xcelium_params.cfg — shared Xcelium analyze/elab parameters
# =============================================================================
# Included by xcelium* flow configs. Individual flows override only what differs.
# DW_SIM is resolved from global_project.cfg [envs].
# =============================================================================

[params]
# RTL analysis: SV mode, multi-extension, DesignWare library search
ALTR_XCELIUM_ANALYZE_SETTINGS = -sv -vlogext v+vs+sv+vh -libext .v,.vs,.sv,.vh -view sv -enable_work_yvlib -y ${DW_SIM} +libext+.v +incdir+${DW_SIM}

# SW-model variant: adds -enable_cfn_sformatf for synthesizable format strings
ALTR_XCELIUMSW_ANALYZE_SETTINGS = -enable_cfn_sformatf -sv -vlogext v+vs+sv+vh -libext .v,.vs,.sv,.vh -view sv -enable_work_yvlib -y ${DW_SIM} +libext+.v +incdir+${DW_SIM}

# Elab flags shared by RTL and SW variants
ALTR_XCELIUM_ELAB_SETTINGS = -errormax 10000 -nobindcache -timescale 1ns/1ps -enable_work_yvlib

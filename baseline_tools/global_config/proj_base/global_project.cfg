# =============================================================================
# global_project.cfg — project-wide environment variables
# =============================================================================
# Mirrors PSG_fe.cth [Envs] section.
# Included by $WORKAREA/tool.cfg so these are visible to all tools and flows.
#
# DW_SIM is the DesignWare simulation library — consumed by vcs_flow.cfg:
#   ALTR_VCS_ANALYZE_SETTINGS = ... -y ${DW_SIM} +libext+.v +incdir+${DW_SIM}
# =============================================================================

[envs]
# standard library tags
IP_MODELS         = /nfs/site/disks/psg.mod.000
SOC_STD_MACRO_TAG = /p/psg/EIP/psg/softip/soc_std_macro/0.8
SOC_COMMON_TAG    = /p/psg/EIP/psg/softip/soc_common/1.6
CTECH_TAG         = /p/psg/EIP/psg/softip/ctech/1.4
ALTR_PKG_TAG      = /p/psg/EIP/psg/softip/altr_pkg/0.5
UVM_PKG_TAG       = /p/psg/eda/synopsys/vcsmx/V-2023.12-SP1-1/linux64/suse/etc/uvm-ieee-2020-2.0
TAP2APB_TAG       = /p/psg/EIP/psg/softip/tap2apb/0.6
DW_SIM            = /p/hdk/cad/fusioncompiler/V-2023.12-SP5-3-T-20250114/dw/sim_ver

# required for upfutils and related flows
WELL_BIAS_UPF     = 1

# =============================================================================
# tool_version.cfg — RTL/FE base tool versions
# =============================================================================
# Copied directly from ioss3_hsio/baseline_tools/rtl_tools.cth (which itself
# includes pesg_fe.baseline_tools/rtl_tools.cth as its base layer).
#
# This is the base version file.  dv_tool_version.cfg and static_tool_version.cfg
# both @include this file and add their own overrides on top.
#
# Rule: bump a version here first.  Only override in a downstream config
# when a specific team or tool genuinely requires a different version.
# =============================================================================

[toolversion]
# --- RTL simulation ---
VCS_VERSION    = W-2024.09-SP2-4
VERDI_VERSION  = W-2024.09-SP2-4
XCM_VERSION    = 24.06.071
QUESTA_VERSION = w241129

# --- Emulation ---
# override veloce to align with dv emulation team
VELOCE_VERSION = v23.0.2_p7

# --- Synthesis ---
# fusion compiler version updated due to antenna error (HSD 18040500220)
FC_VERSION = U-2022.12-SP5-CS4-T-20240629

# --- Timing / methodology ---
TCM_METHODOLOGY_VERSION = 2024.3.2
# fishtail updated for clock propagation bug (HSD 15017381363)
FISHTAIL_VERSION = V-2023.12-SP5-9

# --- Post-processing ---
PP_VERSION = W-2024.09-SP3

# --- DFT / SpyGlass ---
# upgraded as per AE recommendation
DFT_SPYGLASS_VERSION = W-2024.09-SP2-2

# --- UPF utilities ---
UPF_UTILS_VERSION = 24.04.01

# --- VISA (RTL waveform/assertion) ---
# Versions from Cheetah-RTL 2024.12.p05/rtl_tools.cth; no ioss3 override
VISAROOT_VERSION      = 5.3.3
VISAFLOW_ROOT_VERSION = 4.7

# --- Defacto STAR (structural logic analysis) ---
DEFACTO_VERSION = SoC_Compiler_10.0.00.442r

# --- Collage + dependencies (RTL IP assembly / interface checking) ---
# COLLAGE_VERSION not found in scanned Cheetah-RTL layers; placeholder from
# latest HDK install (/p/hdk/rtl/cad/x86-64_linux30/intel/collage/). Verify.
COLLAGE_VERSION              = 6.06
COLLAGE_INTF_DEF_VERSION     = 3.9.7
INTGMSTR_VERSION             = 1.153
BUS_INTERFACE_DEF_VERSION    = 0.47
# SDG_INTERFACE_DEFS_VERSION not found in scanned Cheetah files — verify with Collage team
SDG_INTERFACE_DEFS_VERSION   = TBD

# --- CoreTools (Synopsys IP assembly toolkit) ---
# Version not found in scanned Cheetah-RTL layers — verify with CoreTools owner
CORE_TOOLS_VERSION = TBD

# =============================================================================
# [envs] — install-path base variables
# Tools compose their full HOME paths from these roots + toolversion refs.
# =============================================================================
[envs]
# Altera PSG install mirrors (override HDK defaults from pesg_fe.baseline_tools)
VCS_HOME_PATH    = /p/psg/eda/synopsys/vcsmx
VERDI_HOME_PATH  = /p/psg/eda/synopsys/verdi
VELOCE_HOME_PATH = /p/hdk/rtl/cad/x86-64_linux26/mentor/veloce

# DFT/SpyGlass — Altera-owned methodology and install path
# PSG_FE_CHECKER_UTILITIES_HOME must be defined by the consuming tool.cfg
DFT_METHODOLOGY_PATH = Envs(PSG_FE_CHECKER_UTILITIES_HOME)/sgdft_methodology
DFT_SPYGLASS_PATH    = /p/psg/eda/atrenta/spyglass/Toolversion(DFT_SPYGLASS_VERSION)/linux64/rhel/SPYGLASS_HOME

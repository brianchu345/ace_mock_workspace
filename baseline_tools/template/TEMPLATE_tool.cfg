# =============================================================================
# TEMPLATE_tool.cfg — Tool configuration template
# =============================================================================
# Copy this file to baseline_tools/tools/<tool_name>/<tool_name>_tool.cfg
# and fill in each placeholder.
#
# A tool config owns three things:
#   1. [arc]    — ARC license feature needed to invoke the tool
#   2. [envs]   — environment variables (install paths, composed from version refs)
#   3. [params] — exec-path convenience params consumed by flow wrappers
#
# It does NOT contain flow-specific settings (flags, filelists, pass names).
# Those belong in the corresponding flow config.
#
# Version source — choose ONE base to @include and set activity accordingly:
#   tool_version.cfg        → RTL/FE tools   (activity = rtl)
#   dv_tool_version.cfg     → DV simulation  (activity = dv)
#   static_tool_version.cfg → VC static      (activity = static)
#
# Standalone tools (no global base needed) omit the @include and activity param.
# =============================================================================

# The [params] block MUST come first so activity is defined before the @include
# resolves it.  The parser also supports lazy re-evaluation so ordering is
# technically flexible, but putting params first is clearer.
[params]
activity  = static   # ← set to: dv | static

@include ../../global_config/params(activity)_tool_version.cfg

# -----------------------------------------------------------------------------
# [arc] — ARC license feature tokens
# One token per line.  Format: <arc license>
# Do NOT add queue or timeout settings here — ARC resolves those automatically.
# Override SNPSLMD_QUEUE / SNPS_MAX_WAITTIME in user_override only if required.
# -----------------------------------------------------------------------------
[arc]
<arc license name>

# -----------------------------------------------------------------------------
# [envs] — install-path environment variables
# Compose paths from base roots (HOME_PATH) + toolversion refs.
# -----------------------------------------------------------------------------
[envs]
TOOL_HOME_PATH = /p/<vendor>/eda/<tool_family>
TOOL_HOME      = Envs(TOOL_HOME_PATH)/Toolversion(TOOL_VERSION)

# -----------------------------------------------------------------------------
# [params] — exec paths for flow wrappers
# Flow wrappers reference Params(tool_exec) so they never hard-code full paths.
# (activity is already declared above; add other params here)
# -----------------------------------------------------------------------------
[params]
tool_exec = Envs(TOOL_HOME)/bin/<binary_name>

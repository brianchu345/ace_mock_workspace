# =============================================================================
# TEMPLATE_flow.cfg — Flow configuration template
# =============================================================================
# Copy this file to baseline_tools/flows/<flow_name>/<flow_name>_flow.cfg
# and fill in each placeholder.
#
# A flow config is STANDALONE — it does NOT @include the tool config.
# The flow wrapper should load  tool and flow configs independently
#
# Include chain (in order):
#   1. Optional: Shared params for this flow family (e.g. vcs_params.cfg)
#   2. Optional: DUT design config (sets IP_TYPE in [global_config])
#   3. Optional: ip-type macro file (lazy-evaluated against IP_TYPE)
#
# Section rules:
#   [params]       — Used for defining variables used in configs
#   [<flow_name>]  — overrideable switches, composed command lines, metadata.
#                    User overrides go into user_override/<flow>/<flow>_flow_override.cfg
#                    which re-declares values in this section.
#
#
# =============================================================================

@include ../../global_config/proj_base/sim_params/vcs_params.cfg             # shared VCS settings (example)
@include ../../../cfg/$DUT.design.cfg                                          # sets global_config(IP_TYPE)
@include ../../global_config/proj_base/ip_type_params/ip_type.global_config(IP_TYPE).cfg

# -----------------------------------------------------------------------------
# [params] — override shared defaults for this specific flow
# Only add keys that differ from the included base (vcs_params.cfg, etc.)
# -----------------------------------------------------------------------------
[params]
# Example: vcssw overrides the empty default elab setting
# ALTR_VCS_ELAB_SETTINGS = -error=DTIE

# -----------------------------------------------------------------------------
# [<flow_name>] — flow settings (wrapper reads this section exclusively)
# -----------------------------------------------------------------------------
[<flow_name>]

# Pass identifier — used in output directory naming and GK qualification
PASS = <pass_name>

# Post-processing script path (optional)
# POST_PROCESSING_FILE = $WORKAREA/baseline_tools/flows/<flow_name>/run_audit

# vlogan analyze command line: base flags + ip-type macros + W2E + feature switches
VERILOG_ANALYZE_OPTS = params(ALTR_VCS_ANALYZE_SETTINGS) params(ALTR_MACROS_...) params(W2E_ANALYZE)

# vcs elab command line: base flags + W2E
ELAB_OPTS_SWITCH = params(ALTR_VCS_ELAB_SETTINGS) params(W2E_ELAB)

# Optional feature switches (leave empty to disable):
DEBUG_SWITCH    =   # e.g. -kdb -lca -debug_access+all
VCS_INCREMENTAL =   # e.g. -incr_vlogan
CTH_QUIET_MODE  =   # e.g. -q

# Input filelist path
FILELIST = $WORKAREA/output/$DUT/genfile/json/${DUT}_all_filelist.json

# Output work directory
work_dir = ./<flow_name>_work

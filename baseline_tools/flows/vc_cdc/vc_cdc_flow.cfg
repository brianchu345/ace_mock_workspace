# =============================================================================
# vc_cdc_flow.cfg — VC-CDC baseline flow configuration (milestone: 1.0)
# =============================================================================
# Converted from ioss3_hsio/baseline_tools/vc_cdc/global_flow.cfg
# Milestone CHECK value locked to 1.0 (setup + cdc checks).
# This file is intentionally standalone — it does not include vc_cdc_tool.cfg.
# The flow wrapper reads tool and flow configs separately.
#
# Include chain (order matters):
#   1. ../../../cfg/$DUT.design.cfg                                    — sets [global_config] IP_TYPE
#   2. ../../global_config/proj_base/ip_type_params/ip_type.global_config(IP_TYPE).cfg
#
# [params]  — immutable base flag strings (infra-owned)
# [vc_cdc]  — overrideable switches and flow metadata; wrapper reads this section
# =============================================================================

@include ../../../cfg/$DUT.design.cfg
@include ../../global_config/proj_base/ip_type_params/ip_type.global_config(IP_TYPE).cfg

# -----------------------------------------------------------------------------
# [params] — base flag strings
# ALTR_MACROS_STATIC comes from ip_type include above
# -----------------------------------------------------------------------------
[params]
# vlogan-compatible analysis: SV mode, verbose logging
ALTR_VC_CDC_ANALYZE_SETTINGS = -format sverilog -verbose

# -----------------------------------------------------------------------------
# [vc_cdc] — feature switches and flow metadata
# Wrapper reads [vc_cdc] exclusively; user overrides land here only.
# -----------------------------------------------------------------------------
[vc_cdc]

# Suppress spurious multiple-port name warning during elaboration
VCS_ELAB_OPTS = -suppress=SM_SPNM

# vlogan analysis flags: base settings + ip-type static macros
# ALTR_MACROS_STATIC is defined by the ip_type include (e.g. ip_type.asic.cfg)
VERILOG_ANALYZE_OPTS = params(ALTR_VC_CDC_ANALYZE_SETTINGS) params(ALTR_MACROS_STATIC)

# GK qualification pass identifier (used in output naming)
PASS = gk

# Post-processing audit script CSV — executed by wrapper after vc_cdc run completes
POST_PROCESSING_FILE = $WORKAREA/baseline_tools/flows/vc_cdc/run_audit

# Do not create a symlink from output/<dut>/vc_cdc/latest → this run directory
CREATE_OUTDIR_LINK = false

# Standard-cell black-box model filelist for CDC analysis
# Using the alynx (N3 143H) PDK variant; swap for n3c if targeting the N3C node
CDC_STD_BMOD = $WORKAREA/baseline_tools/flows/vc_cdc/stdcell_filelist/alynx/static_stdcells.f

# Milestone 1.0: run both setup checks and CDC checks
# (milestone 0.5 would be: CHECK = setup only)
CHECK = setup cdc

# CDCQA waiver list maintained by PSG checker utilities
CDCQA_WAIVERS = $PSG_FE_CHECKER_UTILITIES_HOME/vccdc_methodology/cdcqa_waivers.txt

# Input filelist — resolved JSON filelist from genfilelist output
FILELIST = $WORKAREA/output/$DUT/genfile/json/${DUT}_all_filelist.json

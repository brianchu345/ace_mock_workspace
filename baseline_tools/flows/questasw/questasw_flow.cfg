# =============================================================================
# questasw_flow.cfg — QuestaSim SW model simulation baseline flow
# =============================================================================
# Reuses questa_tool.cfg.  Differences: SW filelist, questasw PASS, SW macros.
# =============================================================================
@include ../../global_config/proj_base/sim_params/questa_params.cfg
@include ../../../cfg/$DUT.design.cfg
@include ../../global_config/proj_base/ip_type_params/ip_type.global_config(IP_TYPE).cfg

[questa]
PASS                  = questasw
POST_PROCESSING_FILE  = $WORKAREA/baseline_tools/flows/questasw/run_audit
ENABLE_RTL_DEPSLIST   = true
CREATE_OUTDIR_LINK    = false
FILELIST              = $WORKAREA/output/$DUT/flm/stubs/quartus/${DUT}_sim_flat_filelist.json
MODEL_SIZE_REDUCTION  = $WORKAREA/baseline_tools/flows/questasw/cleanup.cfg
VERILOG_ANALYZE_OPTS  = Params(ALTR_QUESTASW_ANALYZE_SETTINGS) Params(ALTR_MACROS_SIM_RTL) Params(ALTR_PDIM_SW)
ELAB_OPTS_SWITCH      = Params(ALTR_QUESTASW_ELAB_SETTINGS)

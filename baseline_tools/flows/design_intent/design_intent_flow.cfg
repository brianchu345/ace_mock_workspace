# =============================================================================
# design_intent_flow.cfg — Design Intent (DI) check flow configuration
# =============================================================================
# Tool config : ../../tools/design_intent/design_intent_tool.cfg
#
# Sub-flows (each has its own Makefile):
#   psg_bcmrbc    — BCM/RBC register model checking
#   psg_swfrontcheck — SW front-end / UDM checks
#   psg_ipxact    — IP-XACT generation and validation
#   psg_rtl       — RTL generation and quartus model checks
#   psg_miscmod   — Miscellaneous model generation (BCM CDC)
#
# DI commands are discovered dynamically from DESIGN_INTENT_ROOT/bin/ and
# exposed as Params via di_cmds convention:
#   <cmd>_exec = Envs(DESIGN_INTENT_ROOT)/bin/<cmd>
#
# NOTE: Cheetah invokes DI commands via `cth_wrap_di` — this binary is part of
#       the Cheetah infrastructure. In ACE, the flow wrapper must call
#       DESIGN_INTENT_ROOT/bin/<cmd> directly without cth_wrap_di.
#       See migration_status.md Open Question #7.
# =============================================================================

@include ../../../cfg/$DUT.design.cfg

# =============================================================================
# [design_intent] — flow-specific DI settings
# =============================================================================
[design_intent]
DI_CHECKS_YAML = $WORKAREA/baseline_tools/flows/design_intent/di_checks.yaml

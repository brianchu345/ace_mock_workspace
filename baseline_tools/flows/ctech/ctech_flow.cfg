# =============================================================================
# ctech_flow.cfg — Standard-cell technology path base configuration
# =============================================================================
# ctech is a DATA flow, not an EDA tool flow. It provides technology-specific
# standard-cell library paths (RTL models + synthesis corner views).
# There is no binary to invoke — the wrapper reads these params as filelists.
#
# CTECH_TAG is resolved at runtime from the project design.cfg or provided
# via the user override. It points to the root of the ctech installation.
#
# Process-specific variants override CTECH_PATH_RTL and CTECH_PATH_SYN:
#   ctech_n3c_h156l3p48.cfg  — N3C process, 1.56V, 3p48 track
#   ctech_n3p_h169p48.cfg    — N3P process, h169 MO, 48 track
#   ctech_n6.cfg             — N6 process
#   ctech_p1275.cfg          — P1275 legacy process
#   ctech_p1278_160h_ios_50pp.cfg — P1278 process, 160h IOS
#   ctech_p1278_180h_i0m_50pp.cfg — P1278 process, 180h I0M
#
# No EDA license required.
# =============================================================================

[params]
CTECH_PATH_RTL      = Envs(CTECH_TAG)/src/rtl
CTECH_PATH_SYN      = Envs(CTECH_TAG)/src/Envs(TECH)/Envs(TECHMO)/Envs(TECHVT)
CTECH_EXP_PATH_RTL  = Envs(CTECH_TAG)/src/rtl
CTECH_EXP_PATH_SYN  = Envs(CTECH_TAG)/src/Envs(TECH)/Envs(TECHMO)/Envs(TECHVT)

# Default technology selection — override in user_override or project cfg
[envs]
TECH   = n3p
TECHMO = 143mh
TECHVT = lvt

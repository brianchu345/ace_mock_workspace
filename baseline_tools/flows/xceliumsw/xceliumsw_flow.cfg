# =============================================================================
# xceliumsw_flow.cfg — Xcelium SW model simulation baseline flow config
# =============================================================================
@include ../../global_config/proj_base/sim_params/xcelium_params.cfg
@include ../../../cfg/$DUT.design.cfg
@include ../../global_config/proj_base/ip_type_params/ip_type.global_config(IP_TYPE).cfg

[xcelium]
PASS                  = xceliumsw
POST_PROCESSING_FILE  = $WORKAREA/baseline_tools/flows/xceliumsw/run_audit
ENABLE_RTL_DEPSLIST   = true
CREATE_OUTDIR_LINK    = false
FILELIST              = $WORKAREA/output/$DUT/flm/stubs/quartus/${DUT}_sim_flat_filelist.json
ENABLE_PKG_SEARCH     = true
MODEL_SIZE_REDUCTION  = $WORKAREA/baseline_tools/flows/xceliumsw/cleanup.cfg
VERILOG_ANALYZE_OPTS  = Params(ALTR_XCELIUMSW_ANALYZE_SETTINGS) Params(ALTR_MACROS_SIM_RTL) Params(ALTR_PDIM_SW)
ELAB_OPTS_SWITCH      = Params(ALTR_XCELIUMSW_ELAB_SETTINGS)

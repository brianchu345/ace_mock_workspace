# =============================================================================
# rivierasw_flow.cfg — Riviera-PRO SW model simulation baseline flow
# =============================================================================
@include ../../global_config/proj_base/sim_params/riviera_params.cfg
@include ../../../cfg/$DUT.design.cfg
@include ../../global_config/proj_base/ip_type_params/ip_type.global_config(IP_TYPE).cfg

[riviera]
PASS                  = rivierasw
POST_PROCESSING_FILE  = $WORKAREA/baseline_tools/flows/rivierasw/run_audit
ENABLE_RTL_DEPSLIST   = true
CREATE_OUTDIR_LINK    = false
FILELIST              = $WORKAREA/output/$DUT/flm/stubs/quartus/${DUT}_sim_flat_filelist.json
MODEL_SIZE_REDUCTION  = $WORKAREA/baseline_tools/flows/rivierasw/cleanup.cfg
VERILOG_ANALYZE_OPTS  = Params(ALTR_RIVIERASW_ANALYZE_SETTINGS) Params(ALTR_MACROS_SIM_RTL) Params(ALTR_PDIM_SW)
ELAB_OPTS_SWITCH      = Params(ALTR_RIVIERASW_ELAB_SETTINGS)
RUN_NETBATCH          = true

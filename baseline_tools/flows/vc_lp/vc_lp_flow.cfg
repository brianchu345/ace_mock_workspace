# =============================================================================
# vc_lp_flow.cfg — VC-LP (Low Power static analysis) baseline flow config
# =============================================================================
@include ../../global_config/proj_base/ip_type_params/ip_type.global_config(IP_TYPE).cfg
@include ../../../cfg/$DUT.design.cfg

[params]
ALTR_VC_LP_ANALYZE_SETTINGS = -format sverilog -verbose

[vc_lp]
CREATE_OUTDIR_LINK  = false
PASS                = gk
UPF_FILE            = $WORKAREA/output/${DUT}/upf_utils/gk/LocalizeUPF/${DUT}.upf
VERILOG_ANALYZE_OPTS = Params(ALTR_VC_LP_ANALYZE_SETTINGS) Params(ALTR_VC_LP_STATIC)
USE_JSON            = syn

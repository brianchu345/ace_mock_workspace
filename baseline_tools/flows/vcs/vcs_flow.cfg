# =============================================================================
# vcs_flow.cfg — VCS baseline RTL compile+elab flow configuration
# =============================================================================
# Include chain:
#   @include ../../global_config/proj_base/sim_params/vcs_params.cfg        — shared analyze/elab/W2E
#   @include ../../../cfg/$DUT.design.cfg              — sets [global_config] IP_TYPE
#   @include ../../global_config/proj_base/ip_type_params/...    — ip-type macros (lazy-eval)
#
# [params]  — flow-specific overrides of shared params (infra-owned)
# [vcs]     — overrideable switches, composed command lines, flow metadata
#             Wrapper reads [vcs] exclusively; user overrides land here only.
# =============================================================================

@include ../../global_config/proj_base/sim_params/vcs_params.cfg
@include ../../../cfg/$DUT.design.cfg
@include ../../global_config/proj_base/ip_type_params/ip_type.global_config(IP_TYPE).cfg

# -----------------------------------------------------------------------------
# [params] — override shared defaults for this flow
# -----------------------------------------------------------------------------
[params]
# RTL compile/elab needs 64-bit mode; overrides the empty default in vcs_params.cfg
ALTR_VCS_ELAB_SETTINGS = -full64

# -----------------------------------------------------------------------------
# [vcs] — feature switches, composed command lines, flow metadata
# Wrapper reads [vcs] exclusively; user overrides land here only.
# params(KEY) pulls from [params]; vcs(KEY) pulls from this [vcs] section.
# -----------------------------------------------------------------------------
[vcs]

# KDB waveform DB + full signal access  (-kdb -lca -debug_access+all)
# Large disk footprint — leave empty for non-debug runs.
DEBUG_SWITCH =

# Skip re-analysis of unchanged files  (-incr_vlogan)
VCS_INCREMENTAL =

# Suppress informational and warning messages  (-q)
CTH_QUIET_MODE =

# Warn on +define value conflicts across compilation units  (-diag macro_values)
MACRO_OVERRIDES =

# Parallel vlogan jobs  (-jm <n>).  Example: MULTI_THREADING = -jm 8
MULTI_THREADING =

# vlogan: base + ip-type macros + W2E + feature switches
# ALTR_MACROS_SIMPWR_RTL is defined by the ip_type include
VERILOG_ANALYZE_OPTS = params(ALTR_VCS_ANALYZE_SETTINGS) params(ALTR_MACROS_SIMPWR_RTL) params(W2E_ANALYZE) vcs(DEBUG_SWITCH) vcs(VCS_INCREMENTAL) vcs(CTH_QUIET_MODE) vcs(MACRO_OVERRIDES) vcs(MULTI_THREADING)

# vcs elab: base + W2E + feature switches
ELAB_OPTS_SWITCH = params(ALTR_VCS_ELAB_SETTINGS) params(W2E_ELAB) vcs(DEBUG_SWITCH) vcs(CTH_QUIET_MODE)

# Output directory for compiled libraries and elaboration artifacts
work_dir = ./vcs_work

# Pass identifier used in output naming and GK qualification
PASS = gk

# Map file format written into synopsys_sim.setup entries
MAP_FILE_FORMAT = vcs

# Write synopsys_sim.setup; wrapper sets SYNOPSYS_SIM_SETUP to its path
ENABLE_MAP_FILE = true

# Emit per-IP RTL dependency lists  (vlogan -liblist)
ENABLE_RTL_DEPSLIST = true

# Write per-IP resolved filelists into the output area
ENABLE_IP_FILELIST = true

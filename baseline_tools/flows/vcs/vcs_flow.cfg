# =============================================================================
# vcs_flow.cfg — VCS baseline flow configuration
# =============================================================================
# Include chain (order matters — design.cfg must precede ip_type include):
#   1. vcswarn2err.cfg                                    — W2E filter paths
#   2. -../../../cfg/$DUT.design.cfg                      — sets [global_config] IP_TYPE
#   3. -ip_type.global_config(IP_TYPE).cfg                — ip-type macros
#      resolve_value() expands global_config(IP_TYPE) before file lookup,
#      so IP_TYPE from design.cfg is already known at include-resolution time.
#
# [params]  — VCS base flag strings (infra-owned, not user-overridden)
# [vcs]     — feature switches, composed lines, flow metadata
#             Wrapper reads [vcs] exclusively; user overrides land here only.
# =============================================================================

[includes]
vcswarn2err.cfg
-../../../cfg/$DUT.design.cfg
-../../global_config/ip_type_params/ip_type.global_config(IP_TYPE).cfg

# -----------------------------------------------------------------------------
# [params] — VCS base flag strings
# ALTR_VCS_ANALYZE_SETTINGS mirrors global_flow.cfg: adds DesignWare search
# path (-y ${DW_SIM}) so DW primitives are found during analysis.
# ALTR_VCS_ELAB_SETTINGS: 64-bit mode for elaboration (signal access via DEBUG_SWITCH).
# -----------------------------------------------------------------------------
[params]
# vlogan base: SV mode, timescale, DesignWare library search  (-y | vlogan)
ALTR_VCS_ANALYZE_SETTINGS = -sverilog -timescale=1ns/1ps -y ${DW_SIM} +libext+.v +incdir+${DW_SIM}

# vcs elab base: 64-bit mode  (vcs)
# Note: signal access (-debug_access+<mode>) belongs in DEBUG_SWITCH, not here.
# -access +rwc was removed — deprecated since VCS X-2025 (triggers UNKWN_OPTVSIM).
ALTR_VCS_ELAB_SETTINGS = -full64

# -----------------------------------------------------------------------------
# [vcs] — feature switches + composed lines + metadata
# params(KEY) pulls base settings from [params] above or included files.
# vcs(KEY)   pulls overrideable switches from this [vcs] section.
# -----------------------------------------------------------------------------
[vcs]

# KDB waveform DB + full signal access  (-kdb -lca -debug_access+all | vlogan + vcs)
# Large disk footprint — leave empty for non-debug runs.
DEBUG_SWITCH =

# Skip re-analysis of unchanged files  (-incr_vlogan | vlogan)
VCS_INCREMENTAL =

# Suppress informational and warning messages  (-q | vlogan + vcs)
CTH_QUIET_MODE =

# Warn on +define value conflicts across compilation units  (-diag macro_values | vlogan)
MACRO_OVERRIDES =

# Parallel vlogan jobs  (-jm <n> | vlogan).  Example: MULTI_THREADING = -jm 8
MULTI_THREADING =

# vlogan: base + ip-type macros + warn-to-error + feature switches
# ALTR_MACROS_SIMPWR_RTL comes from ip_type.global_config(IP_TYPE).cfg
VERILOG_ANALYZE_OPTS = params(ALTR_VCS_ANALYZE_SETTINGS) params(ALTR_MACROS_SIMPWR_RTL) vcs(W2E_ANALYZE) vcs(DEBUG_SWITCH) vcs(VCS_INCREMENTAL) vcs(CTH_QUIET_MODE) vcs(MACRO_OVERRIDES) vcs(MULTI_THREADING)

# vcs elab: base + warn-to-error + feature switches
ELAB_OPTS_SWITCH = params(ALTR_VCS_ELAB_SETTINGS) vcs(W2E_ELAB) vcs(DEBUG_SWITCH) vcs(CTH_QUIET_MODE)

# Output directory for compiled libraries and elaboration artifacts
work_dir = ./vcs_work

# Pass identifier used in output naming and GK qualification
PASS = gk

# Map file format written into synopsys_sim.setup entries
MAP_FILE_FORMAT = vcs

# Write synopsys_sim.setup; vcs_wrapper sets SYNOPSYS_SIM_SETUP to its path
ENABLE_MAP_FILE = true

# Emit per-IP RTL dependency lists  (vlogan -liblist)
ENABLE_RTL_DEPSLIST = true

# Write per-IP resolved filelists into the output area
ENABLE_IP_FILELIST = true

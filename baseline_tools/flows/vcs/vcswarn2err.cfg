# =============================================================================
# vcswarn2err.cfg — warn-to-error filter file references for VCS
# =============================================================================
# Included by vcs_flow.cfg.  Keys live in [vcs] so they are referenced as
# vcs(W2E_ANALYZE) / vcs(W2E_ELAB) — no [params] namespace collision.
# The .f files live under baseline_tools/flows/vcs/w2e_configs/.
# =============================================================================

[vcs]
# vlogan: promote designated warnings to errors during analysis
W2E_ANALYZE = -f $WORKAREA/baseline_tools/flows/vcs/w2e_configs/w2e_vlog_ip-soc_l5.f

# vcs: promote designated warnings to errors during elaboration
W2E_ELAB    = -file $WORKAREA/baseline_tools/flows/vcs/w2e_configs/w2e_elab_ip-soc_l5.f

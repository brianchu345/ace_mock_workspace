# =============================================================================
# xcelium_flow.cfg — Xcelium RTL compile+elab baseline flow configuration
# =============================================================================
# Tool config  : ../../tools/xcelium/xcelium_tool.cfg  (loaded by flow wrapper)
# Global params: xcelium_params.cfg — shared analyze/elab settings
#
# Include chain (wrapper resolves in order):
#   @include ../../global_config/proj_base/sim_params/xcelium_params.cfg
#   @include ../../../cfg/$DUT.design.cfg
#   @include ../../global_config/proj_base/ip_type_params/ip_type.global_config(IP_TYPE).cfg
# =============================================================================

@include ../../global_config/proj_base/sim_params/xcelium_params.cfg
@include ../../../cfg/$DUT.design.cfg
@include ../../global_config/proj_base/ip_type_params/ip_type.global_config(IP_TYPE).cfg

# =============================================================================
# [xcelium] — flow-specific settings (override or extend xcelium_params.cfg)
# Wrapper reads this section for flow control knobs.
# =============================================================================
[xcelium]
PASS                  = gk
POST_PROCESSING_FILE  = $WORKAREA/baseline_tools/xcelium/run_audit
ENABLE_RTL_DEPSLIST   = true
CREATE_OUTDIR_LINK    = false
ENABLE_PKG_SEARCH     = true
MODEL_SIZE_REDUCTION  = $WORKAREA/baseline_tools/flows/xcelium/cleanup.cfg
VERILOG_ANALYZE_OPTS  = Params(ALTR_XCELIUM_ANALYZE_SETTINGS) Params(ALTR_MACROS_SIMPWR_RTL)
ELAB_OPTS_SWITCH      = Params(ALTR_XCELIUM_ELAB_SETTINGS)

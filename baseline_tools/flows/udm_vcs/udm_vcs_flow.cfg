# =============================================================================
# udm_vcs_flow.cfg — UDM VCS simulation flow (inherits vcs flow)
# =============================================================================
# UDM VCS overrides the VCS baseline with UDM stub filelist and forced defines.
# Inherits all base VCS settings from vcs_flow.cfg.
# =============================================================================
@include ../../flows/vcs/vcs_flow.cfg

[params]
ALTR_MACROS_UDM_VCS = +define+QUARTUS+QUARTUS_ARCS+SW_SYNTHESIZABLE_ONLY+ALTR_HPS_INTEL_MACROS_OFF+FUNCTIONAL+functional+SVA_OFF+INTEL_SVA_OFF+FC_IO96_COMPILE+TSMC_MEMORY_BEH+TSMC_PWR_AWARE

[vcs]
PASS                 = udm_vcs
FILELIST             = $WORKAREA/output/$DUT/flm/stubs/quartus/${DUT}_sim_filelist.json
VERILOG_ANALYZE_OPTS = Params(ALTR_VCS_ANALYZE_SETTINGS) Params(ALTR_MACROS_UDM_VCS) Params(W2E_ANALYZE)

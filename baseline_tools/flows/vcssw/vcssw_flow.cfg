# =============================================================================
# vcssw_flow.cfg — VCS SW-model (RTL/soft IP) compile+elab flow
# =============================================================================
# Uses the RTL VCS tool (vcs_tool.cfg) — wrapper loads that separately.
# Compiles the design with software-model defines (ALTR_MACROS_SIM_RTL +
# ALTR_PDIM_SW) for soft-IP regression and SW emulation checkouts.
#
# @include vcs_params.cfg provides shared analyze/elab/W2E params.
# =============================================================================

@include ../../global_config/proj_base/sim_params/vcs_params.cfg
@include ../../../cfg/$DUT.design.cfg
@include ../../global_config/proj_base/ip_type_params/ip_type.global_config(IP_TYPE).cfg

# -----------------------------------------------------------------------------
# [params] — vcssw-specific overrides of shared defaults
# -----------------------------------------------------------------------------
[params]
# SW model requires DTIE (drive type inconsistency) as a hard error
ALTR_VCS_ELAB_SETTINGS = -error=DTIE

# -----------------------------------------------------------------------------
# [vcs] — flow settings (wrapper reads this section exclusively)
# ALTR_MACROS_SIM_RTL and ALTR_PDIM_SW come from ip_type include above
# -----------------------------------------------------------------------------
[vcs]

PASS = vcssw

POST_PROCESSING_FILE = $WORKAREA/baseline_tools/flows/vcssw/run_audit

CREATE_OUTDIR_LINK = false

# Emit per-IP RTL dependency lists
ENABLE_RTL_DEPSLIST = true

# SW model filelist (stubs from quartus synthesis flat view)
FILELIST = $WORKAREA/output/$DUT/flm/stubs/quartus/${DUT}_sim_flat_filelist.json

DEBUG_SWITCH    =
VCS_INCREMENTAL =

VERILOG_ANALYZE_OPTS = params(ALTR_VCS_ANALYZE_SETTINGS) params(ALTR_MACROS_SIM_RTL) params(ALTR_PDIM_SW) params(W2E_ANALYZE) vcs(DEBUG_SWITCH) vcs(VCS_INCREMENTAL)

ELAB_OPTS_SWITCH = params(ALTR_VCS_ELAB_SETTINGS) params(W2E_ELAB) vcs(DEBUG_SWITCH)

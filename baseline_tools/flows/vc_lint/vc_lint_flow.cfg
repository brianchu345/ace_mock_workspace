# =============================================================================
# vc_lint_flow.cfg — VC-Lint baseline flow configuration (milestone: 1.0)
# =============================================================================
# Converted from ioss3_hsio/baseline_tools/vc_lint/global_flow.cfg
# Milestone locked to 1.0 (full lint checks).
# This file is standalone — it does not include vc_lint_tool.cfg.
# The flow wrapper reads tool and flow configs separately.
#
# Include chain (order matters):
#   1. ../../../cfg/$DUT.design.cfg                                    — sets [global_config] IP_TYPE
#   2. ../../global_config/proj_base/ip_type_params/ip_type.global_config(IP_TYPE).cfg
#              Lazy-evaluated: parser expands global_config(IP_TYPE) before resolving
#              the path, so IP_TYPE from design.cfg is already known at include time.
#
# [params]  — immutable base flag strings (infra-owned)
# [vc_lint] — overrideable switches and flow metadata; wrapper reads this section
# =============================================================================

@include ../../../cfg/$DUT.design.cfg
@include ../../global_config/proj_base/ip_type_params/ip_type.global_config(IP_TYPE).cfg

# -----------------------------------------------------------------------------
# [params] — base flag strings
# ALTR_MACROS_STATIC comes from ip_type include above
# -----------------------------------------------------------------------------
[params]
# vlogan-compatible analysis: SV mode, verbose logging
ALTR_VC_LINT_ANALYZE_SETTINGS     = -format sverilog -verbose

# VCS analyze settings for lint (timescale required by vc_static VCS elaboration)
ALTR_VC_LINT_VCS_ANALYZE_SETTINGS = -timescale=1ns/1ps

# -----------------------------------------------------------------------------
# [vc_lint] — feature switches and flow metadata
# Wrapper reads [vc_lint] exclusively; user overrides land here only.
# -----------------------------------------------------------------------------
[vc_lint]

# GK qualification pass identifier (used in output naming)
PASS = gk

# Post-processing audit script — executed by wrapper after vc_lint run completes
POST_PROCESSING_FILE = $WORKAREA/baseline_tools/flows/vc_lint/run_audit

# Do not create a symlink from output/<dut>/vc_lint/latest → this run directory
CREATE_OUTDIR_LINK = false

# Remove intermediate run artifacts after completion
CLEAN_STAGE = run

# vlogan analysis flags: base settings + ip-type static macros
# ALTR_MACROS_STATIC is defined by the ip_type include (e.g. ip_type.asic.cfg)
VERILOG_ANALYZE_OPTS = params(ALTR_VC_LINT_ANALYZE_SETTINGS) params(ALTR_MACROS_STATIC)

# VCS analyze options for elaboration during lint
VCS_ANALYZE_OPTS = params(ALTR_VC_LINT_VCS_ANALYZE_SETTINGS)

# Liberty filelist for standard cell black-box models (alynx = N3 143H PDK variant)
LIBLIST = $WORKAREA/baseline_tools/flows/vc_lint/liberty_filelist/alynx/liberty_file.list

# Use synthesis-optimized JSON filelist (syn view)
USE_JSON = syn

# Input filelist — resolved JSON filelist from genfilelist output
FILELIST = $WORKAREA/output/$DUT/genfile/json/${DUT}_all_filelist.json

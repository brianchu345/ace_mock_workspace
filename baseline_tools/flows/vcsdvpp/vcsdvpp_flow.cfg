# =============================================================================
# vcsdvpp_flow.cfg — VCS DV post-processing compile+elab flow
# =============================================================================
# Uses the RTL VCS tool (vcs_tool.cfg) — wrapper loads that separately.
# Compiles with DV post-processing defines (ALTR_MACROS_SIM_DV_PP +
# ALTR_PDIM_DV) and UVM package include for post-silicon correlation.
# DEBUG_SWITCH enabled by default (KDB + full signal access).
#
# @include vcs_params.cfg provides shared analyze/elab/W2E params.
# =============================================================================

@include ../../global_config/proj_base/sim_params/vcs_params.cfg
@include ../../../cfg/$DUT.design.cfg
@include ../../global_config/proj_base/ip_type_params/ip_type.global_config(IP_TYPE).cfg

# [params] — no elab override needed; default empty from vcs_params.cfg is correct

# -----------------------------------------------------------------------------
# [vcs] — flow settings (wrapper reads this section exclusively)
# ALTR_MACROS_SIM_DV_PP, ALTR_PDIM_DV come from ip_type include above
# =============================================================================
[vcs]

PASS = vcsdvpp

POST_PROCESSING_FILE = $WORKAREA/baseline_tools/flows/vcsdvpp/run_audit

CREATE_OUTDIR_LINK = false

ENABLE_RTL_DEPSLIST = true

DEBUG_SWITCH    = true
VCS_INCREMENTAL =

VERILOG_ANALYZE_OPTS = params(ALTR_VCS_ANALYZE_SETTINGS) +incdir+${UVM_PKG_TAG} params(ALTR_MACROS_SIM_DV_PP) params(ALTR_PDIM_DV) params(W2E_ANALYZE) vcs(DEBUG_SWITCH) vcs(VCS_INCREMENTAL)

ELAB_OPTS_SWITCH = params(ALTR_VCS_ELAB_SETTINGS) params(W2E_ELAB) vcs(DEBUG_SWITCH)

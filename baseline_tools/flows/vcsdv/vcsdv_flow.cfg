# =============================================================================
# vcsdv_flow.cfg — VCS DV-testbench compile+elab flow
# =============================================================================
# Uses the RTL VCS tool (vcs_tool.cfg) — wrapper loads that separately.
# Compiles RTL design with DV testbench defines (ALTR_MACROS_SIM_DV +
# ALTR_PDIM_DV) and UVM package include for functional verification.
#
# NOTE: despite the "dv" name, the underlying VCS binary is the RTL version
# (VCS_VERSION = W-2024.09-SP2-4), not the DV vcssim version.
# For the DV VCS simulation environment, see vcssim_tool.cfg.
#
# @include vcs_params.cfg provides shared analyze/elab/W2E params.
# UVM_PKG_TAG is available from global_project.cfg [envs].
# =============================================================================

@include ../../global_config/proj_base/sim_params/vcs_params.cfg
@include ../../../cfg/$DUT.design.cfg
@include ../../global_config/proj_base/ip_type_params/ip_type.global_config(IP_TYPE).cfg

# [params] — no elab override needed; default empty from vcs_params.cfg is correct

# -----------------------------------------------------------------------------
# [vcs] — flow settings (wrapper reads this section exclusively)
# ALTR_MACROS_SIM_DV, ALTR_PDIM_DV come from ip_type include above
# UVM_PKG_TAG comes from global_project.cfg [envs]
# -----------------------------------------------------------------------------
[vcs]

PASS = vcsdv

POST_PROCESSING_FILE = $WORKAREA/baseline_tools/flows/vcsdv/run_audit

CREATE_OUTDIR_LINK = false

ENABLE_RTL_DEPSLIST = true

DEBUG_SWITCH    = true
VCS_INCREMENTAL =

VERILOG_ANALYZE_OPTS = params(ALTR_VCS_ANALYZE_SETTINGS) +incdir+${UVM_PKG_TAG} params(ALTR_MACROS_SIM_DV) params(ALTR_PDIM_DV) params(W2E_ANALYZE) vcs(DEBUG_SWITCH) vcs(VCS_INCREMENTAL)

ELAB_OPTS_SWITCH = params(ALTR_VCS_ELAB_SETTINGS) params(W2E_ELAB) vcs(DEBUG_SWITCH)

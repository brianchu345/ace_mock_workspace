# =============================================================================
# collage_tb_tool.cfg — Collage Testbench assembly tool configuration
# =============================================================================
# Version base : tool_version.cfg (via collage_tool.cfg includes)
# Depends on   : collage_tool.cfg (COLLAGE_HOME_PATH, COLLAGE_VERSION)
#                coretools_tool.cfg (CORE_TOOLS_HOME_PATH, CORE_TOOLS_VERSION)
# License      : synopsys/coretools
#
# Flow wrappers must read both this file and the base collage + coretools
# tool configs. This config adds the TB-specific environment on top.
# =============================================================================

[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

[params]
COLLAGE_HOME_PATH            = /p/hdk/rtl/cad/x86-64_linux30/intel/collage
COLLAGE_INTF_DEF_HOME_PATH   = /p/hdk/rtl/cad/x86-64_linux30/intel/collage_intf_def
SDG_INTERFACE_DEFS_HOME_PATH = /p/hdk/rtl/proj_tools/interface_defs
CORE_TOOLS_HOME_PATH         = /p/hdk/rtl/cad/x86-64_linux30/synopsys/coretools

[envs]
COLLAGE_ROOT               = Params(COLLAGE_HOME_PATH)/Toolversion(COLLAGE_VERSION)
COLLAGE_CHASSIS_BOOTSTRAP  = Params(COLLAGE_HOME_PATH)/Toolversion(COLLAGE_VERSION)/tools/collage/utils/chassis_bootstrap.tcl
COLLAGE_INTF_DEF           = Params(COLLAGE_INTF_DEF_HOME_PATH)/Toolversion(COLLAGE_INTF_DEF_VERSION)
COLLAGE_BATCH_MODE         = 1
COLLAGE_BATCH_MODE_EXIT    = 1
CORE_TOOLS_DIR             = Params(CORE_TOOLS_HOME_PATH)/Toolversion(CORE_TOOLS_VERSION)
CORE_TOOLS_VER             = Toolversion(CORE_TOOLS_VERSION)
SDG_INTERFACE_DEFS         = Params(SDG_INTERFACE_DEFS_HOME_PATH)/Toolversion(SDG_INTERFACE_DEFS_VERSION)
COLLAGE_PORT_WITH_COMPNAME = 1
buildEnable                = 1
assembleTBEnable           = 1

[arc]
# NOT IN arc_license.txt — verify: synopsys/coretools

# =============================================================================
# psg_roap_tool.cfg — PSG ROAP (RTL ordering and partitioning) tool config
# =============================================================================
# psg_roap version defined in psg_tools.cth; not tracked in ACE global config.
# Verify the installed version at /p/hdk/cad/psg_roap/.
# =============================================================================
[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
PSG_ROAP_HOME         = /p/hdk/cad/psg_roap/Toolversion(psg_roap)
IPDE_CORNERS_DEF_FILE = Envs(PSG_ROAP_HOME)/corners.xml
IP_CORNERS_DEF_FILE   = Envs(PSG_ROAP_HOME)/corners.xml

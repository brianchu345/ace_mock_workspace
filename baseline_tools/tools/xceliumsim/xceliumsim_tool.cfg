# =============================================================================
# xceliumsim_tool.cfg — Cadence Xcelium DV simulation tool configuration
# =============================================================================
# Version base  : dv_tool_version.cfg (xcelium = 24.09.071, from DV team)
# Install base  : HDK x86-64_linux30 (XCM_BASE_PATH) — no PSG mirror
# vs xcelium_tool.cfg: uses a newer DV xcelium version (24.09 vs 24.06)
#                      and sets extra Cadence runtime env flags required for DV
# License       : cadence/xcelium
# =============================================================================

[params]
activity = dv

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
# CDS_INST_DIR — Cadence tool locator variable (points at install base, not versioned dir)
CDS_INST_DIR              = Envs(XCM_BASE_PATH)
XCM_HOME                  = Envs(XCM_BASE_PATH)/Toolversion(xcelium)
CDS_AUTO_64BIT            = ALL

# Required Cadence AVS/UPS feature flags for DV regression correctness
ENABLE_UPS_MSEL_HDL_FORCE         = 1
CADENCE_ENABLE_AVSREQ_94144_PHASE_1 = 1
CADENCE_ENABLE_AVSREQ_19610_PHASE_1 = 1
CADENCE_ENABLE_AVSREQ_44905_PHASE_1 = 1
CADENCE_ENABLE_AVSREQ_63188_PHASE_1 = 1

[arc]
# NOT IN arc_license.txt — verify: cadence/xcelium

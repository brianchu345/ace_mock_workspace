# =============================================================================
# vc_common_tool.cfg — VC-Common tool configuration
# =============================================================================
# vc_common uses VCCOMMON_VERSION (not VCLINT or VCCDC) for its home path.
# It provides common VC static methodology only (no CDC/lint-specific paths).
# VC_FLAVOR=COMMON. PSG path applied for consistency.
# Versions inherited from static_tool_version.cfg.
# =============================================================================

[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

[arc]
# NOT IN arc_license.txt — verify: synopsys/vc_static
atrenta_spyglass-lic/baseLint_batch

[envs]
VCCOMMON_HOME_PATH            = /p/psg/eda/synopsys/vc_static
VC_STATIC_HOME                = Envs(VCCOMMON_HOME_PATH)/Toolversion(VCCOMMON_VERSION)

VCCOMMON_METHODOLOGY_PATH     = /p/hdk/rtl/proj_tools/vc_methodology_common/master
VC_METHODOLOGY_COMMON         = Envs(VCCOMMON_METHODOLOGY_PATH)/Toolversion(VCCOMMON_METHODOLOGY_VERSION)

VC_FLAVOR                     = COMMON

[params]
vc_static_exec = Envs(VC_STATIC_HOME)/bin/vc_static_shell

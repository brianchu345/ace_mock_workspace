# =============================================================================
# vc_cdc_tool.cfg — VC-CDC static analysis tool configuration
# =============================================================================
# Versions are inherited from global_config/static_tool_version.cfg via @include,
# which itself includes tool_version.cfg (RTL base).
# Bump VCCDC_VERSION, CDCQA_VERSION, etc. in static_tool_version.cfg — not here.
#
# This file owns:
#   [arc]    — license feature tokens
#   [envs]   — compose install paths from inherited roots + versions
#   [params] — convenience exec-path param consumed by flow wrappers
# =============================================================================

[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

[arc]
# vc_static covers vc_cdc + vc_lint + vc_rdc licenses
# NOT IN arc_license.txt — verify: synopsys/vc_static
atrenta_spyglass-lic/advancedCDC

# -----------------------------------------------------------------------------
# [envs] — install paths composed from static_tool_version.cfg [toolversion] refs
# -----------------------------------------------------------------------------
[envs]
# ioss3 uses PSG mirror (not HDK path /p/hdk/rtl/cad/x86-64_linux30/synopsys/vc_static)
VCCDC_HOME_PATH              = /p/psg/eda/synopsys/vc_static
VC_STATIC_HOME               = Envs(VCCDC_HOME_PATH)/Toolversion(VCCDC_VERSION)

# PSG checker utilities — CDCQA binaries, methodology TCLs, waiver files
PSG_FE_CHECKER_UTILITIES_HOME = /p/cth/cad/psg_fe_checker_utilities/Toolversion(PSG_FE_CHECKER_UTILITIES_VERSION)

# CDC methodology — ioss3 overrides to PSG checker utilities (not HDK path)
VCCDC_METHODOLOGY_PATH       = Envs(PSG_FE_CHECKER_UTILITIES_HOME)/vccdc_methodology/master
VC_METHODOLOGY_CDC           = Envs(VCCDC_METHODOLOGY_PATH)

# VC common methodology remains at HDK path (not overridden by ioss3)
VCCOMMON_METHODOLOGY_PATH    = /p/hdk/rtl/proj_tools/vc_methodology_common/master
VC_METHODOLOGY_COMMON        = Envs(VCCOMMON_METHODOLOGY_PATH)/Toolversion(VCCOMMON_VERSION)

# Global waiver path (parent of master; used for milestone-specific waiver lookup)
CDC_MILESTONE_GLOBAL_WAIVER_PATH = Envs(PSG_FE_CHECKER_UTILITIES_HOME)/vccdc_methodology

# CDCQA binary directory
CDCQA_HOME                   = Envs(PSG_FE_CHECKER_UTILITIES_HOME)/vccdc_methodology/cdcqa/Toolversion(CDCQA_VERSION)/bin

# Tool flavor identifier (used by Synopsys methodology scripts)
VC_FLAVOR                    = CDC

# NOTE: SNPSLMD_QUEUE and SNPS_MAX_WAITTIME are intentionally omitted.
# ARC resolves license queue settings automatically.
# Override in user_override only if a specific cluster or timeout is required.

# -----------------------------------------------------------------------------
# [params] — exec path; flow wrapper uses this to avoid hard-coding full path
# -----------------------------------------------------------------------------
[params]
# vc_static binary is vc_static_shell; VC_FLAVOR=CDC drives CDC analysis mode
vc_static_exec = Envs(VC_STATIC_HOME)/bin/vc_static_shell

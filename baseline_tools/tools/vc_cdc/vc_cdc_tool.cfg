# =============================================================================
# vc_cdc_tool.cfg — VC-CDC static analysis tool configuration
# =============================================================================
# Aggregated from three Cheetah layers (ioss3 values win in all conflicts):
#   1. /p/hdk/cad/Cheetah-RTL/2024.12.p05/rtl_tools.cth       — base versions
#   2. pesg_fe.baseline_tools/vc_cdc/tool.cth                  — install paths
#   3. ioss3_hsio/baseline_tools/vc_cdc/tool.cth               — project overrides
#   4. ioss3_hsio/baseline_tools/psg_tools.cth                 — PSG utilities path
#
# Cheetah [License] blocks (synopsys/vc_static, synopsys/spyglass) map to [arc].
# Cheetah toolversion() in path expressions map to params() in ACE.
# =============================================================================

[arc]
# vc_static covers vc_cdc + vc_lint + vc_rdc licenses
synopsys/vc_static
synopsys/spyglass

# -----------------------------------------------------------------------------
# [params] — version strings; bump here only, path [envs] are composed below
# -----------------------------------------------------------------------------
[params]
# ioss3 project overrides (supersede Cheetah-RTL 2024.12.p05 base values)
VCCDC_VERSION                = V-2023.12-SP2-10
VCCOMMON_VERSION             = V-2023.12-SP2-7
VCCDC_METHODOLOGY_VERSION    = 0.06.08.pre01.25ww23
VCCOMMON_METHODOLOGY_VERSION = 2.04.07.25ww07
CDCQA_VERSION                = 2025.02.01

# PSG checker utilities: provides CDCQA, methodology, waivers, audit scripts.
# Must be >= 1.27.x — earlier versions lack vccdc_methodology/ and vc_cdc-specific scripts.
# Check /p/cth/cad/psg_fe_checker_utilities/ for available versions.
PSG_FE_CHECKER_UTILITIES_VERSION = 1.27.2

# vc_cdc executable (used by flow wrappers; avoids hard-coding the full path)
vc_cdc_exec = envs(VC_STATIC_HOME)/bin/vc_cdc

# -----------------------------------------------------------------------------
# [envs] — shell environment variables exported into the ace session
# -----------------------------------------------------------------------------
[envs]
# Tool installation path — ioss3 project uses PSG mirror, not the HDK path
# (pesg_fe.baseline_tools used /p/hdk/rtl/cad/x86-64_linux30/synopsys/vc_static)
VCCDC_HOME_PATH              = /p/psg/eda/synopsys/vc_static
VC_STATIC_HOME               = envs(VCCDC_HOME_PATH)/params(VCCDC_VERSION)

# PSG checker utilities — CDCQA binaries, methodology TCLs, waiver files
PSG_FE_CHECKER_UTILITIES_HOME = /p/cth/cad/psg_fe_checker_utilities/params(PSG_FE_CHECKER_UTILITIES_VERSION)

# CDC methodology paths
# ioss3 overrides VCCDC_METHODOLOGY_PATH to PSG checker utilities (not HDK path)
VCCDC_METHODOLOGY_PATH       = envs(PSG_FE_CHECKER_UTILITIES_HOME)/vccdc_methodology/master
VC_METHODOLOGY_CDC           = envs(VCCDC_METHODOLOGY_PATH)

# VC common methodology remains at HDK path (not overridden by ioss3)
VCCOMMON_METHODOLOGY_PATH    = /p/hdk/rtl/proj_tools/vc_methodology_common/master
VC_METHODOLOGY_COMMON        = envs(VCCOMMON_METHODOLOGY_PATH)/params(VCCOMMON_METHODOLOGY_VERSION)

# Global waiver path (parent of master; used for milestone-specific waiver lookup)
CDC_MILESTONE_GLOBAL_WAIVER_PATH = envs(PSG_FE_CHECKER_UTILITIES_HOME)/vccdc_methodology

# CDCQA binary directory — ioss3 path (vs. pesg_fe: /p/cth/pu_tu/prd/cdcqa/...)
CDCQA_HOME                   = envs(PSG_FE_CHECKER_UTILITIES_HOME)/vccdc_methodology/cdcqa/params(CDCQA_VERSION)/bin

# Tool flavor identifier (used by Synopsys methodology scripts)
VC_FLAVOR                    = CDC

# NOTE: SNPSLMD_QUEUE and SNPS_MAX_WAITTIME are intentionally omitted.
# ARC resolves license queue settings automatically when it appends the [arc]
# tokens above to the environment. Override these in user_override only if a
# specific cluster or timeout is required for your site.

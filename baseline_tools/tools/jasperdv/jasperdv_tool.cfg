# =============================================================================
# jasperdv_tool.cfg — Cadence JasperGold DV formal verification tool config
# =============================================================================
# Uses the same JG_VERSION as RTL jasper (both in static_tool_version.cfg via
# shared base tool_version.cfg).
# =============================================================================
[params]
activity = dv

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
JG_HOME_PATH = /p/hdk/rtl/cad/x86-64_linux30/jasper/jaspergold
JG_HOME      = Envs(JG_HOME_PATH)/Toolversion(JG_VERSION)

[arc]
jasper_gold-lic/license

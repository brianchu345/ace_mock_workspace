# =============================================================================
# zebu_tool.cfg — Synopsys ZeBu emulation platform tool configuration
# =============================================================================
# Version base : dv_tool_version.cfg
# Install base : HDK x86-64_linux26, no PSG mirror
# Licenses     : synopsys/zebu (ZeBu server), xilinx/vivado (FPGA bitstream gen)
#
# Notes:
#   ZSE_PATH   — ZeBu Software Environment (RTL compiler + HW server control)
#   SYNOPSYS   — DesignCompiler for ZeBu front-end synthesis
#   GCC_HOME / TESTBENCH_GCC — EMU GCC (same as veloce)
# =============================================================================

[params]
activity = dv

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
ZSE_PATH      = /p/hdk/rtl/cad/x86-64_linux26/synopsys/z_zse/Toolversion(zse)
SYNOPSYS      = /p/hdk/cad/designcompiler/Toolversion(emu_designcompiler)
GCC_HOME      = /usr/intel/pkgs/gcc/Toolversion(emu_gcc)
TESTBENCH_GCC = /usr/intel/pkgs/gcc/Toolversion(emu_tb_gcc)
JEM           = /p/hdk/rtl/cad/em64t_SLES12/dt/jem/Toolversion(jem)
SIMICS_HOME   = /p/hdk/cad/windriver/simics/Toolversion(simics)
DVB_ROOT      = ${WORKAREA}/dvb/Toolversion(dvb)/dvb

[arc]
# NOT IN arc_license.txt — verify: synopsys/zebu
# NOT IN arc_license.txt — verify: xilinx/vivado

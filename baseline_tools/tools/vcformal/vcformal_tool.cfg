# =============================================================================
# vcformal_tool.cfg — VCFormal verification tool configuration
# =============================================================================
# VCFormal uses VC_VERSION (older release, separate from vc_static family).
# No ioss3 project override exists — uses Cheetah-RTL base version T-2022.06.
# Install path remains at HDK (no PSG mirror for this version).
# VC_VERSION inherited from static_tool_version.cfg.
# =============================================================================

[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

[arc]
# NOT IN arc_license.txt — verify: synopsys/vcformal

[envs]
# HDK path — no PSG mirror available for VC_VERSION=T-2022.06
VC_HOME_PATH   = /p/hdk/rtl/cad/x86-64_linux26/synopsys/vc_static
VC_STATIC_HOME = Envs(VC_HOME_PATH)/Toolversion(VC_VERSION)

[params]
vc_static_exec = Envs(VC_STATIC_HOME)/bin/vc_static_shell

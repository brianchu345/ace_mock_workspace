# =============================================================================
# visadv_tool.cfg — Intel VISA (DV variant) tool configuration
# =============================================================================
# Version base  : dv_tool_version.cfg (visa_root = 5.3, visaflow_root = 4.7)
# Install paths : HDK x86-64_linux26, no PSG mirror
# Usage         : DV flows requiring VISA signal tracing (slightly older version
#                 than RTL visa_tool.cfg which uses VISAROOT_VERSION = 5.3.3)
# =============================================================================

[params]
activity = dv

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
VISAROOT      = /p/hdk/rtl/cad/x86-64_linux26/intel/VisaIT/Toolversion(visa_root)
VISAFLOW_ROOT = /p/hdk/rtl/cad/x86-64_linux26/intel/VisaFlow/Toolversion(visaflow_root)

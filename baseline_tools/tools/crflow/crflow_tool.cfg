# =============================================================================
# crflow_tool.cfg — OneSource CR (Component Register) flow tool configuration
# =============================================================================
# Version base : dv_tool_version.cfg (onesource = 24.37.4, socbuilder_client = 0.37.1)
# Install base : HDK x86-64_linux26/dt/OneSourceBundle
# No EDA license required.
# NOTE: Cheetah dir is `crflow`; user requested as `cr_flow` (no underscore).
#       ACE directory follows Cheetah naming: crflow.
#
# OneSource components:
#   ONE_SOURCE_BUNDLE     — root of the OneSource installation
#   ONE_SOURCE_GEN        — code generators (RTL, UVM, CRIF, etc.)
#   ONE_SOURCE_VALIDATOR  — spec/model validation scripts
#   ONE_SOURCE_INTEGRATOR — integration tooling
#   SOCB_CLIENT           — SoC Builder client for structured design
#   OSAL_LIB_RELEASE_DIR  — OSAL Python3 libraries
# =============================================================================

[params]
activity = dv

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
ONE_SOURCE_BUNDLE    = /p/hdk/rtl/cad/x86-64_linux26/dt/OneSourceBundle/Toolversion(onesource)
ONE_SOURCE_GEN       = Envs(ONE_SOURCE_BUNDLE)/OneSourceGen
ONE_SOURCE_API       = Envs(ONE_SOURCE_BUNDLE)/OneSourceXmlApi
ONE_SOURCE_INTEGRATOR = Envs(ONE_SOURCE_BUNDLE)/OneSourceIntegrator
ONE_SOURCE_VALIDATOR = Envs(ONE_SOURCE_BUNDLE)/OneSourceValidator
ONE_SOURCE_STUDIO    = Envs(ONE_SOURCE_BUNDLE)/OneSourceStudio
ONE_SOURCE_CONSUMER  = Envs(ONE_SOURCE_BUNDLE)/OneSourceConsumer
OSAL_LIB_RELEASE_DIR = Envs(ONE_SOURCE_BUNDLE)/OSAL/OSALPython3Lib/release_dir
SPEC2OSAL            = Envs(ONE_SOURCE_BUNDLE)/OSAL/Spec2Osal
SOCB_CLIENT          = /p/hdk/rtl/proj_tools/socbuilder_client/Toolversion(socbuilder_client)

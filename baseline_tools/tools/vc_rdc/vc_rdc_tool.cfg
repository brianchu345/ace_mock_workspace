# =============================================================================
# vc_rdc_tool.cfg — VC-RDC static analysis tool configuration
# =============================================================================
# RDC (Reset Domain Crossing) uses the same vc_static binary as CDC,
# sharing the same install path and VCCDC_* version keys.
# VC_FLAVOR=RDC drives RDC analysis mode.
#
# ioss3 has no project-level overrides for vc_rdc (pure passthrough in Cheetah).
# Versions and PSG install path inherited from static_tool_version.cfg.
# =============================================================================

[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

[arc]
# NOT IN arc_license.txt — verify: synopsys/vc_static
atrenta_spyglass-lic/advancedCDC

[envs]
# PSG mirror path (consistent with vc_cdc)
VCCDC_HOME_PATH              = /p/psg/eda/synopsys/vc_static
VC_STATIC_HOME               = Envs(VCCDC_HOME_PATH)/Toolversion(VCCDC_VERSION)

# PSG checker utilities
PSG_FE_CHECKER_UTILITIES_HOME = /p/cth/cad/psg_fe_checker_utilities/Toolversion(PSG_FE_CHECKER_UTILITIES_VERSION)

# RDC methodology — standard HDK path
VCCDC_METHODOLOGY_PATH       = /p/hdk/rtl/proj_tools/vc_methodology_cdc/master
VC_METHODOLOGY_RDC           = Envs(VCCDC_METHODOLOGY_PATH)/Toolversion(VCCDC_METHODOLOGY_VERSION)

# VC common methodology
VCCOMMON_METHODOLOGY_PATH    = /p/hdk/rtl/proj_tools/vc_methodology_common/master
VC_METHODOLOGY_COMMON        = Envs(VCCOMMON_METHODOLOGY_PATH)/Toolversion(VCCOMMON_VERSION)

# CDCQA applies to RDC analysis as well
CDCQA_HOME                   = Envs(PSG_FE_CHECKER_UTILITIES_HOME)/vccdc_methodology/cdcqa/Toolversion(CDCQA_VERSION)/bin

VC_FLAVOR                    = RDC

[params]
vc_static_exec = Envs(VC_STATIC_HOME)/bin/vc_static_shell

# =============================================================================
# vcs_tool.cfg — VCS RTL simulation tool configuration
# =============================================================================
# Versions are inherited from global_config/tool_version.cfg via @include.
# Bump VCS_VERSION / VERDI_VERSION in tool_version.cfg — not here.
#
# This file owns:
#   [arc]    — license feature tokens
#   [envs]   — compose VCS_HOME / VERDI_HOME from inherited path roots + versions
#   [params] — convenience exec-path params consumed by flow wrappers
# =============================================================================

[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

[arc]
# NOT IN arc_license.txt — verify: vcs-vcsmx-lic
# NOT IN arc_license.txt — verify: synopsys_verdi-lic

# -----------------------------------------------------------------------------
# [envs] — compose full install paths using inherited roots and versions
# VCS_HOME_PATH / VERDI_HOME_PATH come from tool_version.cfg [envs]
# VCS_VERSION   / VERDI_VERSION   come from tool_version.cfg [toolversion]
# -----------------------------------------------------------------------------
[envs]
VCS_HOME        = Envs(VCS_HOME_PATH)/Toolversion(VCS_VERSION)
VERDI_HOME      = Envs(VERDI_HOME_PATH)/Toolversion(VERDI_VERSION)
VCS_TARGET_ARCH = linux64

# -----------------------------------------------------------------------------
# [params] — exec paths; flow wrappers reference these to avoid hard-coding
# -----------------------------------------------------------------------------
[params]
vlogan_exec = Envs(VCS_HOME)/bin/vlogan
vhdlan_exec = Envs(VCS_HOME)/bin/vhdlan
vcs_exec    = Envs(VCS_HOME)/bin/vcs
verdi_exec  = Envs(VERDI_HOME)/bin/verdi

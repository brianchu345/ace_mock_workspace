# =============================================================================
# vcs_tool.cfg
# =============================================================================
# Mirrors Cheetah pesg_fe.baseline_tools/vcs/tool.cth + rtl_tools.cth pattern:
#   VCS_HOME_PATH / VCS_VERSION → VCS_HOME  (bump version here only)
#   VERDI_HOME_PATH / VERDI_VERSION → VERDI_HOME
#
# PSG install paths come from rtl_tools.cth [ENVS]:
#   VCS_HOME_PATH   = /p/psg/eda/synopsys/vcsmx   (overrides HDK default)
#   VERDI_HOME_PATH = /p/psg/eda/synopsys/verdi
#
# [arc] is license-only — does not resolve tool paths.
# =============================================================================

[arc]
vcs-vcsmx-lic
synopsys_verdi-lic

[params]
VCS_VERSION   = X-2025.06-SP1-1
VERDI_VERSION = X-2025.06-SP1-1

[envs]
VCS_HOME_PATH   = /p/psg/eda/synopsys/vcsmx
VERDI_HOME_PATH = /p/psg/eda/synopsys/verdi
VCS_HOME        = envs(VCS_HOME_PATH)/params(VCS_VERSION)/linux64/suse
VERDI_HOME      = envs(VERDI_HOME_PATH)/params(VERDI_VERSION)/linux64/suse
VCS_TARGET_ARCH = linux64

[params]
vlogan_exec = envs(VCS_HOME)/bin/vlogan
vhdlan_exec = envs(VCS_HOME)/bin/vhdlan
vcs_exec    = envs(VCS_HOME)/bin/vcs
verdi_exec  = envs(VERDI_HOME)/bin/verdi


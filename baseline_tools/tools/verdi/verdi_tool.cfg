# =============================================================================
# verdi_tool.cfg — Synopsys Verdi waveform debug tool configuration
# =============================================================================
# Version base : tool_version.cfg (VERDI_VERSION)
# VERDI_HOME   : PSG mirror matches rtl vcs_tool.cfg — same install location
# Note         : vcs_tool.cfg also sets VERDI_HOME for joint compile+debug
#                flows. Include this config standalone for waveform-only flows.
# License      : synopsys/verdi
# =============================================================================

[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
VERDI_HOME = Envs(VERDI_HOME_PATH)/Toolversion(VERDI_VERSION)


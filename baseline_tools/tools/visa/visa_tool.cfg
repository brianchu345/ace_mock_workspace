# =============================================================================
# visa_tool.cfg — Intel VISA (RTL waveform / assertion checking) tool config
# =============================================================================
# Version base  : tool_version.cfg (VISAROOT_VERSION = 5.3.3, VISAFLOW_ROOT_VERSION = 4.7)
# Install paths : HDK x86-64_linux26, no PSG mirror
# Usage         : RTL flows requiring VISA signal tracing or assertion replay
# Note          : visadv_tool.cfg covers the DV team's older visa_root=5.3 variant
# =============================================================================

[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
VISAROOT      = /p/hdk/rtl/cad/x86-64_linux26/intel/VisaIT/Toolversion(VISAROOT_VERSION)
VISAFLOW_ROOT = /p/hdk/rtl/cad/x86-64_linux26/intel/VisaFlow/Toolversion(VISAFLOW_ROOT_VERSION)

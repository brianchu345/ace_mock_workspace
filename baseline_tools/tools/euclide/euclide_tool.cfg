VCS_HOME    = /p/hdk/rtl/cad/x86-64_linux44/synopsys/vcsmx/Toolversion(vcssim_vcs)
VERDI_HOME  = /p/hdk/rtl/cad/x86-64_linux44/synopsys/verdi3/Toolversion(vcssim_verdi)
GTK_PLUS_HOME    = /usr/intel/pkgs/gtk+/Toolversion(gtkp)/lib64


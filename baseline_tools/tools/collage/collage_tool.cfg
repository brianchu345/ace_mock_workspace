# =============================================================================
# collage_tool.cfg — Intel Collage IP assembly / interface checking tool
# =============================================================================
# Version base : tool_version.cfg
# Install base : HDK x86-64_linux30 (no PSG mirror)
# No EDA license required (Collage is Intel-internal tooling).
#
# NOTE: COLLAGE_VERSION placeholder = 6.06 (latest HDK install).
#       Actual version not found in scanned Cheetah-RTL layers — verify.
#       See migration_status.md Open Question #1.
# NOTE: SDG_INTERFACE_DEFS_VERSION = TBD — verify with Collage team.
#       See migration_status.md Open Question #3.
# =============================================================================

[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
COLLAGE_VERSION          = Toolversion(COLLAGE_VERSION)
COLLAGE_INTF_DEF_VERSION = Toolversion(COLLAGE_INTF_DEF_VERSION)
INTGMSTR_VERSION         = Toolversion(INTGMSTR_VERSION)
SDG_INTERFACE_DEFS_VERSION = Toolversion(SDG_INTERFACE_DEFS_VERSION)
BUS_INTERFACE_DEF_VERSION  = Toolversion(BUS_INTERFACE_DEF_VERSION)

[params]
COLLAGE_HOME_PATH            = /p/hdk/rtl/cad/x86-64_linux30/intel/collage
COLLAGE_INTF_DEF_HOME_PATH   = /p/hdk/rtl/cad/x86-64_linux30/intel/collage_intf_def
SDG_INTERFACE_DEFS_HOME_PATH = /p/hdk/rtl/proj_tools/interface_defs
BUS_INTERFACE_DEF_HOME_PATH  = /p/hdk/rtl/cad/x86-64_linux30/intel/bus_interface_defs

# =============================================================================
# vc_lint_tool.cfg — VC-Lint static analysis tool configuration
# =============================================================================
# Versions are inherited from global_config/static_tool_version.cfg via @include.
# ioss3 project overrides VCLINT_VERSION, VCLINT_METHODOLOGY_VERSION,
# VCCOMMON_VERSION, and VCCOMMON_METHODOLOGY_VERSION (differs from vc_cdc).
#
# Source layers:
#   1. pesg_fe.baseline_tools/vc_lint/tool.cth   — HDK base paths
#   2. ioss3_hsio/baseline_tools/vc_lint/tool.cth — PSG path + version overrides
# =============================================================================

[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

# Override VCCOMMON_METHODOLOGY_VERSION: vc_lint uses a newer version than vc_cdc
[toolversion]
VCCOMMON_METHODOLOGY_VERSION = 2.04.08.25ww11

[arc]
# NOT IN arc_license.txt — verify: synopsys/vc_static
atrenta_spyglass-lic/baseLint_batch

# -----------------------------------------------------------------------------
# [envs] — install paths from ioss3 overrides + static_tool_version.cfg refs
# ioss3 sets VCLINT_HOME_PATH = /p/psg/eda/synopsys/vc_static (PSG mirror)
# -----------------------------------------------------------------------------
[envs]
VCLINT_HOME_PATH              = /p/psg/eda/synopsys/vc_static
VC_STATIC_HOME                = Envs(VCLINT_HOME_PATH)/Toolversion(VCLINT_VERSION)

# PSG checker utilities — waiver files + methodology TCLs for lint
PSG_FE_CHECKER_UTILITIES_HOME = /p/cth/cad/psg_fe_checker_utilities/Toolversion(PSG_FE_CHECKER_UTILITIES_VERSION)
LINT_MILESTONE_GLOBAL_WAIVER_PATH = Envs(PSG_FE_CHECKER_UTILITIES_HOME)/vclint_methodology

# Lint methodology — HDK path (no PSG override for methodology itself)
VCLINT_METHODOLOGY_PATH       = /p/hdk/rtl/proj_tools/vc_methodology_lint/master
VC_METHODOLOGY_LINT           = Envs(VCLINT_METHODOLOGY_PATH)/Toolversion(VCLINT_METHODOLOGY_VERSION)

# VC common methodology
VCCOMMON_METHODOLOGY_PATH     = /p/hdk/rtl/proj_tools/vc_methodology_common/master
VC_METHODOLOGY_COMMON         = Envs(VCCOMMON_METHODOLOGY_PATH)/Toolversion(VCCOMMON_METHODOLOGY_VERSION)

# Tool flavor identifier (used by Synopsys methodology scripts)
VC_FLAVOR                     = LINT

# NOTE: SNPSLMD_QUEUE and SNPS_MAX_WAITTIME intentionally omitted.
# ARC resolves license queue settings automatically.

# -----------------------------------------------------------------------------
# [params] — exec path consumed by flow wrapper
# vc_static binary is vc_static_shell; VC_FLAVOR=LINT drives lint analysis mode
# -----------------------------------------------------------------------------
[params]
vc_static_exec = Envs(VC_STATIC_HOME)/bin/vc_static_shell

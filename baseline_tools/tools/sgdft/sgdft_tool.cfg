# =============================================================================
# sgdft_tool.cfg — Synopsys SpyGlass DFT analysis tool configuration
# =============================================================================
# PSG mirror path for SpyGlass DFT (overrides HDK default); methodology path
# comes from PSG_FE_CHECKER_UTILITIES_HOME defined in vc_common_tool.cfg.
# =============================================================================
[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
# DFT_SPYGLASS_PATH and DFT_METHODOLOGY_PATH are defined in tool_version.cfg [envs]
# pointing to PSG mirror and PSG_FE_CHECKER_UTILITIES_HOME/sgdft_methodology
DFT_SPYGLASS_DC_PATH = /p/hdk/cad/designcompiler/Toolversion(DFT_SPYGLASS_DC_VERSION)
SPYGLASS_HOME        = Envs(DFT_SPYGLASS_PATH)
SPYGLASS_DC_PATH     = Envs(DFT_SPYGLASS_DC_PATH)

[arc]
atrenta_spyglass-lic/baseLint_batch
# NOT IN arc_license.txt — verify: synopsys/designcompiler

# =============================================================================
# xcelium_tool.cfg — Cadence Xcelium RTL simulation tool configuration
# =============================================================================
# Version base : tool_version.cfg (XCM_VERSION = 24.06.071, VERDI_VERSION)
# Install base : HDK x86-64_linux30 — no PSG mirror for Xcelium RTL version
# Binaries     : tools/inca/bin/64bit/xmvlog, xmelab, xmsim
#                tools/bin/xrun
# Verdi        : bundled for waveform debug; VERDI_HOME_PATH from PSG mirror
# Licenses     : cadence/xcelium, synopsys/verdi
# =============================================================================

[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
XCM_HOME_PATH = /p/hdk/rtl/cad/x86-64_linux30/cadence/xcelium
XCM_HOME      = Envs(XCM_HOME_PATH)/Toolversion(XCM_VERSION)
VERDI_HOME    = Envs(VERDI_HOME_PATH)/Toolversion(VERDI_VERSION)

[arc]
# NOT IN arc_license.txt — verify: cadence/xcelium
# NOT IN arc_license.txt — verify: synopsys/verdi

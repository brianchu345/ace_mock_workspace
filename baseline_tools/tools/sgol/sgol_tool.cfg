[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
OL_SPYGLASS_PATH              = /p/hdk/rtl/cad/x86-64_linux26/atrenta/spyglass/Toolversion(OL_SPYGLASS_VERSION)/SPYGLASS_HOME
OL_METHODOLOGY_PATH           = /p/hdk/rtl/proj_tools/spyglass_methodology_lint/master/Toolversion(OL_METHODOLOGY_VERSION)
OL_SPYGLASS_DC_PATH           = /p/hdk/cad/designcompiler/Toolversion(OL_SPYGLASS_DC_VERSION)
SPYGLASS_HOME                 = Envs(OL_SPYGLASS_PATH)
SPYGLASS_METHODOLOGY_RTL_LINT = Envs(OL_METHODOLOGY_PATH)/rtl_lint
SPYGLASS_DC_PATH              = Envs(OL_SPYGLASS_DC_PATH)
SPYGLASS_LINT_GOAL_OVERRIDE   = /p/hdk/rtl/proj_tools/sg_overrides/master/1.00.00/sglint/SGLintCRSOverride.spq
SPYGLASS_ENABLE_LICENSE_QUEUE = 1

[arc]

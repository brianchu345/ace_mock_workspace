# =============================================================================
# powerartist_tool.cfg — Ansys PowerArtist RTL power analysis tool config
# =============================================================================
[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
POWERARTIST_HOME_PATH = /p/hdk/rtl/cad/x86-64_linux26/apache/PowerArtist/Toolversion(POWERARTIST_VERSION)
VERDI_HOME            = /p/hdk/rtl/cad/x86-64_linux26/synopsys/verdi3/Toolversion(VERDI_VERSION)
DC_PATH               = /p/hdk/cad/designcompiler/Toolversion(DFT_SPYGLASS_DC_VERSION)

[params]
ENABLE_CGE_REPORT = true
UPLOAD_CSV_DATA   = true

[arc]

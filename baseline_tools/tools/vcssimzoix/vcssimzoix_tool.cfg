# =============================================================================
# vcssimzoix_tool.cfg — VCS DV simulation with ZOIX fault-injection tool
# =============================================================================
# Extends vcssim with the ZOIX home path for fault-injection simulation.
# ZOIX version comes from dv_tool_version.cfg (zoix = V-2023.12-SP2-2).
#
# Source: pesg_fe.baseline_tools/vcssimzoix/tool.cth
# =============================================================================

[params]
activity = dv

@include ../../global_config/params(activity)_tool_version.cfg

[arc]
# NOT IN arc_license.txt — verify: synopsys/vcsmx

[envs]
VCS_HOME        = Envs(VCS_HOME_PATH)/Toolversion(vcssim_vcs)/linux64/suse
VERDI_HOME      = Envs(VERDI_HOME_PATH)/Toolversion(vcssim_verdi)/linux64/suse
VCS_TARGET_ARCH = suse64
VCS_LIC_EXPIRE_WARNING = 0

# ZOIX fault-injection tool — required for ZOIX-based simulation runs
ZOIXHOME = /p/hdk/rtl/cad/x86-64_linux26/synopsys/z_vcs/Toolversion(zoix)

[params]
vlogan_exec = Envs(VCS_HOME)/bin/vlogan
vcs_exec    = Envs(VCS_HOME)/bin/vcs
verdi_exec  = Envs(VERDI_HOME)/bin/verdi

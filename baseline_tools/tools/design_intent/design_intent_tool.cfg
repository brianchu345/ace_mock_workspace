# =============================================================================
# design_intent_tool.cfg — Altera Design Intent (DI) tool configuration
# =============================================================================
# This tool aggregates multiple PSG sub-tools required for Design Intent checks:
#   altera_design_intent — DI command framework (cth_wrap_di dispatcher)
#   psg_roap_utilities   — RoAP (Register and Attribute Processor) scripts
#   rbc_utilities         — Register Bus Checker scripts
#   psg_magillem_wrapper  — Wrapper for Magillem IP-XACT assembler
#   bcm_tools             — BCM (Bus Connectivity Model) generation tools
#   magillem_assembler    — Magillem IP-XACT GUI/headless assembler
#
# NOTE: design_intent includes ../psg_tools.cth in Cheetah, which provides
#       PSG_ROAP_UTILITIES_HOME, RBC_UTILITIES_ROOT, and Magillem paths.
#       These are inlined here since ACE does not use psg_tools.cth.
#
# NOTE: cth_wrap_di is a Cheetah-specific dispatcher binary located at
#       DESIGN_INTENT_ROOT/bin/. The ACE flow wrapper must replace cth_wrap_di
#       with native ACE command dispatch. See migration_status.md Open Q #7.
#
# License: magillem-lic/license (Magillem IP-XACT assembler)
# =============================================================================

[toolversion]
altera_design_intent  = 2.33.2
psg_roap_utilities    = 3.09
rbc_utilities         = 1.4
psg_magillem_wrapper  = 1.13
bcm_tools             = 6.3.4
MAGILLEM_ASSEMBLER_VERSION = 5.2024.12

[envs]
DESIGN_INTENT_ROOT      = /p/cth/cad/altera_design_intent/Toolversion(altera_design_intent)
PSG_ROAP_UTILITIES_HOME = /p/hdk/cad/psg_roap_utilities/Toolversion(psg_roap_utilities)
RBC_UTILITIES_ROOT      = /p/cth/cad/rbc_utilities/Toolversion(rbc_utilities)
BCM_TOOLS_HOME          = /p/cth/cad/bcm_tools/Toolversion(bcm_tools)

# Magillem IP-XACT assembler (inline from magillem_assembler/tool.cth)
MAGILLEM_HOME           = /p/psg/eda/magillem/magillem/Toolversion(MAGILLEM_ASSEMBLER_VERSION)/linux64/suse
MAGILLEM_MRE_BIN        = /p/psg/eda/magillem/magillem/Toolversion(MAGILLEM_ASSEMBLER_VERSION)/linux64/suse/reg_wrapper/2.22/bin
MAGILLEM_CONFIGURATION_AREA = /p/psg/data/${USER}/.Magillem_Altera_Toolversion(MAGILLEM_ASSEMBLER_VERSION)/configuration
LM_PROJECT              = PSG-RND

# Runtime flag required by DI sub-commands
ARC2NB = 1

[arc]
feature = magillem-lic/license

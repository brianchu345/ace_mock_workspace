# =============================================================================
# fuseflow_tool.cfg — Intel OneSource FuseFlow (fuse register flow) tool config
# =============================================================================
# Uses onesource and socbuilder_client versions from dv_tool_version.cfg.
# socfusegen is the SOC Fuse Generator binary.
# =============================================================================
[params]
activity = dv

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
SOCFUSEGEN               = /p/hdk/rtl/cad/x86-64_linux26/dt/SOCFuseGen/Toolversion(socfusegen)
ONE_SOURCE_BUNDLE        = /p/hdk/rtl/cad/x86-64_linux26/dt/OneSourceBundle/Toolversion(onesource)
ONE_SOURCE_API           = Envs(ONE_SOURCE_BUNDLE)/OneSourceXmlApi
ONE_SOURCE_VALIDATOR     = Envs(ONE_SOURCE_BUNDLE)/OneSourceValidator
ONE_SOURCE_STUDIO        = Envs(ONE_SOURCE_BUNDLE)/OneSourceStudio
FUSE_IMPORTER            = Envs(ONE_SOURCE_BUNDLE)/FuseImporter
FUSE_EXPORTER            = Envs(ONE_SOURCE_BUNDLE)/FuseExporter
SPEC2FUSE_DIR            = Envs(ONE_SOURCE_BUNDLE)/OneSourceGen/Spec2Fuse
SOCB_CLIENT              = /p/hdk/rtl/proj_tools/socbuilder_client/Toolversion(socbuilder_client)
IFS_FUSEPARSER_PATH      = /p/hdk/rtl/cad/x86-64_linux26/dt/IFSFuseParser/2024ww29.3

# =============================================================================
# vcssim_tool.cfg — VCS DV simulation tool configuration
# =============================================================================
# DV simulation uses a DIFFERENT VCS version than RTL simulation:
#   vcssim_vcs   = V-2023.12-SP1-1   (DV, from dv_tool_version.cfg)
#   VCS_VERSION  = W-2024.09-SP2-4   (RTL, from tool_version.cfg)
#
# The PSG install for V-* versions uses a linux64/suse subdirectory.
# (W-* versions have a flat bin/ directly under the version root.)
#
# This tool config is shared by:
#   vcssim          — base DV simulation
#   vcssimmpp       — multi-pass predict (MPP) compilation; tool env is identical
#   vcssimmppxprop  — same as vcssimmpp but xprop enabled at flow level (not tool level)
#                     NOTE: vcssimmpp and vcssimmppxprop are effectively the same tool.
#                     The xprop difference (-xprop=tmerge or +xpropagation) is a
#                     compile/elab FLAG in the flow config, not a tool distinction.
#   vcssimemu       — EMU regression; uses same vcssim VCS version at tool level
#                     (emu_vcs = S-2021.09-SP2-9 is used only by the emu BUILD flow)
#
# Source: pesg_fe.baseline_tools/vcssim/tool.cth + ioss3/dv_tools.cth overrides
# =============================================================================

[params]
activity = dv

@include ../../global_config/params(activity)_tool_version.cfg

[arc]
# NOT IN arc_license.txt — verify: synopsys/vcsmx

# -----------------------------------------------------------------------------
# [envs] — DV VCS install paths
# VCS_HOME_PATH / VERDI_HOME_PATH are inherited from dv_tool_version.cfg -> tool_version.cfg
# vcssim_vcs / vcssim_verdi versions come from dv_tool_version.cfg [toolversion]
# V-* releases at PSG mirror use linux64/suse subdirectory (unlike W-* flat bin/)
# -----------------------------------------------------------------------------
[envs]
VCS_HOME        = Envs(VCS_HOME_PATH)/Toolversion(vcssim_vcs)/linux64/suse
VERDI_HOME      = Envs(VERDI_HOME_PATH)/Toolversion(vcssim_verdi)/linux64/suse
VCS_TARGET_ARCH = suse64

# Suppress license expiry warnings during regression runs
VCS_LIC_EXPIRE_WARNING = 0

# -----------------------------------------------------------------------------
# [params] — exec paths for flow wrappers
# -----------------------------------------------------------------------------
[params]
vlogan_exec = Envs(VCS_HOME)/bin/vlogan
vcs_exec    = Envs(VCS_HOME)/bin/vcs
verdi_exec  = Envs(VERDI_HOME)/bin/verdi

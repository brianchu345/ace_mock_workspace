# =============================================================================
# vps_tool.cfg — Mentor VPS (FPGA-based emulation) tool configuration
# =============================================================================
# Version base : dv_tool_version.cfg
# Install base : HDK x86-64_linux26, no PSG mirror
# Licenses     : mentor/vps (RED hardware), xilinx/vivado (FPGA synthesis)
#
# Notes:
#   RED_HOME      — VPS software installation root
#   PROFPGA_HOME  — ProFPGA board support package bundled with VPS
#   TBX_HOME      — Transaction-based acceleration HW/SW bridge
#   MGC_HOME      — Mentor QuestaSim bundled with VPS (not the main DV questa)
#   VISUALIZER    — Mentor Visualizer for VPS waveform debug
# =============================================================================

[params]
activity = dv

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
RED_HOME             = /p/hdk/rtl/cad/x86-64_linux26/mentor/VPS/Toolversion(vps)
PROFPGA_HOME         = Envs(RED_HOME)/profpga
TBX_HOME             = Envs(RED_HOME)/os3fp/tbx
QUARTUS_HOME         = /p/hdk/rtl/cad/x86-64_linux26/altera/quartus_prime_pro/Toolversion(quartus)/quartus
QSYS_HOME            = Envs(QUARTUS_HOME)/sopc_builder
VIVADO_HOME          = /p/hdk/rtl/cad/x86-64_linux26/xilinx/vivado/Toolversion(vivado)
RED_SOFTMODEL_HOME   = /p/hdk/rtl/cad/x86-64_linux26/mentor/VirtuaLAB/Toolversion(red_softmodel)/red_softmodel
RED_VIS_HOME         = /p/hdk/rtl/cad/x86-64_linux26/mentor/visualizer/Toolversion(visualizer)
VISUALIZER_HOME      = Envs(RED_VIS_HOME)
MGC_HOME             = /p/hdk/rtl/cad/x86-64_linux26/mentor/questasim/Toolversion(vps_questasim)
GCC_HOME             = /usr/intel/pkgs/gcc/Toolversion(fpga_gcc)
TESTBENCH_GCC        = /usr/intel/pkgs/gcc/Toolversion(fpga_tb_gcc)
JEM                  = /p/hdk/rtl/cad/em64t_SLES12/dt/jem/Toolversion(jem)
SIMICS_HOME          = /p/hdk/cad/windriver/simics/Toolversion(simics)
DVB_ROOT             = ${WORKAREA}/dvb/Toolversion(dvb)/dvb

[arc]
# NOT IN arc_license.txt — verify: mentor/vps
# NOT IN arc_license.txt — verify: xilinx/vivado

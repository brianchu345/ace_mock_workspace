# =============================================================================
# haps_tool.cfg — Synopsys HAPS FPGA emulation platform tool configuration
# =============================================================================
[params]
activity = dv

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
VIVADO_PATH           = /p/hdk/rtl/cad/x86-64_linux26/xilinx/vivado/Toolversion(vivado)
XILINX_VIVADO         = Envs(VIVADO_PATH)
PROTOCOMPILER_PATH    = /p/hdk/rtl/cad/x86-64_linux26/synopsys/protocompiler/Toolversion(protocompiler)
PROTOCOMPILER_RT_PATH = Envs(PROTOCOMPILER_PATH)
CDPL_HOME             = Envs(PROTOCOMPILER_PATH)
SYNOPSYS              = /p/hdk/cad/designcompiler/Toolversion(haps_dc_version)
VCS_HOME              = /p/hdk/rtl/cad/x86-64_linux26/synopsys/vcs_pc/Toolversion(fpga_vcs)
VERDI_HOME            = /p/hdk/rtl/cad/x86-64_linux26/synopsys/verdi3/Toolversion(fpga_verdi)
GCC_HOME              = /usr/intel/pkgs/gcc/Toolversion(fpga_gcc)
TESTBENCH_GCC         = /usr/intel/pkgs/gcc/Toolversion(fpga_tb_gcc)
JEM                   = /p/hdk/rtl/cad/em64t_SLES12/dt/jem/Toolversion(jem)
DVB_ROOT              = /p/cth/cad/dvb/Toolversion(dvb)/dvb

[arc]

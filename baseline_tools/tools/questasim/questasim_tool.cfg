# =============================================================================
# questasim_tool.cfg — Siemens QuestaSim DV simulation tool configuration
# =============================================================================
# questasim (DV) uses lowercase "questasim" version key from dv_tool_version.cfg.
# questa (RTL) uses uppercase QUESTA_VERSION from tool_version.cfg.
# These are intentionally separate keys with potentially different versions.
# =============================================================================
[params]
activity = dv

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
QUESTA_HOME = /p/hdk/rtl/cad/x86-64_linux26/mentor/questasim/Toolversion(questasim)


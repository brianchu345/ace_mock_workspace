# =============================================================================
# mint_tool.cfg — Siemens Tessent MBIST DFT tool configuration
# =============================================================================
[params]
activity = static

@include ../../global_config/params(activity)_tool_version.cfg

[envs]
MINT_PATH             = /p/hdk/cad/mint/Toolversion(MINT_VERSION)
MINT_TESSENT_HOME_PATH = /p/hdk/cad/tessent/Toolversion(MINT_TESSENT_VERSION)
MINT_VCS_HOME_PATH    = /p/hdk/rtl/cad/x86-64_linux26/synopsys/vcsmx/Toolversion(MINT_VCS_VERSION)
MINT_VERDI_HOME_PATH  = /p/hdk/rtl/cad/x86-64_linux26/synopsys/verdi3/Toolversion(MINT_VERDI_VERSION)
VCS_HOME              = Envs(MINT_VCS_HOME_PATH)
VERDI_HOME            = Envs(MINT_VERDI_HOME_PATH)
VCS_ARCH_OVERRIDE     = suse32
TESSENT_MBIST_MULTI_TEST_PORT_IN_PARALLEL           = 1
TESSENT_MBIST_RELAX_FUNCTION_NONE_PORT_VALIDATION   = 1
TESSENT_PLUGIN_PATH   = Envs(MINT_PATH)/customPlugIn

[arc]
# NOT IN arc_license.txt — verify: mentor/tessent
# NOT IN arc_license.txt — verify: synopsys/vcsmx
# NOT IN arc_license.txt — verify: synopsys/verdi3

# =============================================================================
# user_override/vcs/vcs_flow.cfg — per-user / per-run flow overrides
# =============================================================================
# Includes the baseline vcs_flow.cfg first, then overrides specific params.
# Only set what you want to change; everything else comes from baseline.
#
# Pass to vcs_wrapper:
#   --flow-cfg $WORKAREA/user_override/vcs/vcs_flow.cfg
# =============================================================================

[includes]
../../baseline_tools/flows/vcs/vcs_flow.cfg

# -----------------------------------------------------------------------------
# Overrides for bypass_pnr_reg_fp test run — all under [vcs]
# -----------------------------------------------------------------------------
[vcs]

# KDB waveform DB + full signal access enabled for this run
DEBUG_SWITCH = -kdb -lca -debug_access+all

# Check for +define conflicts across the multi-IP compilation
MACRO_OVERRIDES = -diag macro_values

# Compiled libraries and elaboration artifacts land here
work_dir = $WORKAREA/work/bypass_pnr_reg_fp
